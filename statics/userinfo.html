    //1--刷新页面
    function myLogin(up_id = '') {
      if (loginOpening || loginLayerIndex !== null) {
        return;
      }
      loginOpening = true;
      var uuid = getUUID();
      admin.req({
        url: 'http://192.168.177.129:8000/cq/user/qrcode',

          var timeTranslate = null
          if (result.code == 200) {
            var index = layer.open({

              title: '会员登录',
              closeBtn: 1,
              shadeClose: true,
              area: ['500px', 'auto'],
              skin: 'member-login-layer',
              content: $("#myLogin"),

                loginLayerIndex = index;
                loginOpening = false;
                loginPollingTimer = setInterval(function () {
                  var formdate = new FormData();
                  formdate.append("key", key);
                  if (up_id != '') {
                    formdate.append("up_id", up_id);
                  }
                  $.ajax({
                    url: 'http://192.168.177.129:8000/cq/user/get_user_info',

                        formdate1.append("headImgUrl", res.data.avatar);
                        formdate1.append("token", res.token);
                        admin.req({
                          url: jaxui.url + 'wx/wxlogin/login',
                          processData: false,
                          contentType: false,
                          data: formdate1,
                          async: false,
                          done: function (result) {

                            if (result.data) {

                              if (loginPollingTimer) {

                              }
                              // console.log(result.customer)
                              // $.cookie('user', JSON.stringify(result.customer), { path: '/' });
                              // $.cookie('token',result.token,{ path: '/' });
                              // $.cookie('usertoken',result.token,{ path: '/' });
                              var expireDate = new Date();
                              expireDate.setTime(expireDate.getTime() + 60 * 60 * 1000);

                              $.cookie('hzusertoken', result.token, {
                                expires: expireDate,
                                path: '/'
                              });
                              var hzUserData = $.extend({}, res.data || {});
                              result.customer.phone = hzUserData.phone || '';
                              if (hzUserData.open_id) {
                                result.customer.openid = hzUserData.open_id;
                                result.customer.open_id = hzUserData.open_id;
                              }
                              $.cookie('user', JSON.stringify(result.customer), { expires: expireDate, path: '/' });
                              $.cookie('token', result.token, { expires: expireDate, path: '/' });

                              function finalizeLoginRedirect(finalUserData) {
                                var mergedUserData = $.extend({}, hzUserData, finalUserData || {});

                                $.cookie('userinfo', JSON.stringify(mergedUserData), { expires: expireDate, path: '/' });
                                $.cookie('userInfo', JSON.stringify(mergedUserData), { expires: expireDate, path: '/' });

                                if (typeof syncHzUserSessionCache === 'function') {
                                  syncHzUserSessionCache(mergedUserData, {
                                    data: mergedUserData,
                                    open_id: mergedUserData.open_id || result.customer.openid || result.customer.open_id || '',
                                    openid: mergedUserData.open_id || result.customer.openid || result.customer.open_id || ''
                                  });
                                }
                                if (typeof clearPendingWsUserInfoHydration === 'function') {
                                  clearPendingWsUserInfoHydration();
                                }
                                try {
                                  window.sessionStorage.removeItem('hz_person_home_snapshot_v2');
                                } catch (e) {}
                                window.location.replace('/code/user.html?login=1&_ts=' + Date.now());
                              }

                              $.ajax({
                                url: 'http://192.168.177.129:8000/cq/user/get_user_info_h5',
                                type: 'GET',
                                dataType: 'json',
                                headers: {
                                  boxVersion: '1.0.0',
                                  token: result.token
                                },
                                data: {
                                  open_id: hzUserData.open_id || result.customer.openid || result.customer.open_id || ''
                                },
                                success: function (userInfoRes) {
                                  if (userInfoRes && Number(userInfoRes.code) === 200 && userInfoRes.data) {
                                    finalizeLoginRedirect(userInfoRes.data);
                                    return;
                                  }
                                  finalizeLoginRedirect(hzUserData);
                                },
                                error: function () {
                                  finalizeLoginRedirect(hzUserData);
                                }
                              });
                              return;
                            }
                          }
                        })
                      }
                    },
                    error: function (xhr, status, error) {
                      // 处理错误情况
                      console.error("Error occurred: " + error);
                    }
                  });
                }, 250);
              },
              end: function() {
                if (loginPollingTimer) {
                  clearInterval(loginPollingTimer);
                  loginPollingTimer = null;
                }
                loginLayerIndex = null;
                loginOpening = false;
              }
            });
          }else{
            loginOpening = false;
          }
        }
      })
    }

    var getDate = function () {
      var date = new Date();
      var year = date.getFullYear(); //获取完整的年份(4位)
      var month = date.getMonth() + 1; //获取当前月份(0-11,0代表1月)
      var day = date.getDate(); //获取当前日(1-31)
      if (month < 10) {
        month = '0' + month;
      }
      if (day < 10) {
        day = '0' + day;
      }
      return year + '' + month + '' + day;
    }

    var getUUID = function () {
      return 'xxxx-xxxx-xxxx-xxxx-xxxx'.replace(/[xy]/g, function (c) {
        var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

  <style>
        body {

            color: #fff;

 <body> 
  <div class="chat-container"> 
   <div class="chat-header">
     AI 聊天机器人 
   </div> 
   <div class="chat-messages" id="chat-messages"> 
    <!-- 聊天消息将动态插入到这里 --> 
   </div> 
   <div class="chat-input"> 
    <input type="text" id="chat-input" placeholder="输入消息..." onkeypress="handleKeyPress(event)"> 
    <button onclick="sendMessage()">发送</button> 
   </div> 
  </div> 
  <script src="./statics/js/jquery-3.7.1.js"></script> 
  <script>
    const chatMessages = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    var baseUrl ="http://jaxone.5cq.com/server/"
    function sendMessage() {
        const message = chatInput.value.trim();
        if (message === '') return;

        // 添加用户消息到聊天窗口
        addMessage('user', message);

        // 清空输入框
        chatInput.value = '';

        // 显示加载状态
        showLoading();
        $.ajax({
            //返回相同的session
            url: baseUrl + 'ranking/chat',
            type: 'POST',
            data: {
                'message': message,
            },
            ContentType: "application/json; charset=utf-8",
            // timeout: 10000,    //超时时间
            dataType: 'json',
            success: function (data, textStatus, jqXHR) {
                hideLoading();
                var message = data.choices[0].message.content;
                addMessage('bot', message.replace(/\n/g, '<br>'));
            },error: function (jqXHR, textStatus, errorThrown) {
                addMessage("哎呀，出错了！", 'bot'); // 添加机器人的回复到聊天窗口
                scrollToBottom(); // 每次添加消息后滚动到底部
            }
        });
        // 发送消息到后端并获取 AI 回复
        /*fetch(baseUrl + 'ranking/chat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ message: message })
        })
            .then(response => response.json())
            .then(data => {
                // 隐藏加载状态
                hideLoading();

                // 添加 AI 回复到聊天窗口
                addMessage('bot', data.choices[0].message.content);
            })
            .catch(error => {
                console.error('Error:', error);
                hideLoading();
                addMessage('bot', 'Error: Could not get response.');
            });*/
    }

    function addMessage(sender, message) {
        const messageElement = document.createElement('div');
        messageElement.classList.add('message', sender);
        messageElement.innerHTML = `<p>${message}</p>`;
        chatMessages.appendChild(messageElement);
        scrollToBottom();
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function showLoading() {
        const loadingElement = document.createElement('div');
        loadingElement.classList.add('loading');
        loadingElement.id = 'loading-message';
        loadingElement.textContent = 'AI 思考中...';
        chatMessages.appendChild(loadingElement);
        scrollToBottom();
    }

    function hideLoading() {
        const loadingElement = document.getElementById('loading-message');
        if (loadingElement) {
            loadingElement.remove();
        }
    }

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }
</script>

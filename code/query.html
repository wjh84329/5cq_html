  <script>
    $(function () {
        function getUrlParam(name) {
            var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)"); //构造一个含有目标参数的正则表达式对象
            var r = window.location.search.substr(1).match(reg);  //匹配目标参数
            if (r != null) return unescape(r[2]);
            return null; //返回参数值
        }

        var id = getUrlParam("id");
        if (id != null) {
            var html = $(".table").html();
            $.ajax({
                    url: baseUrl + "jax/order/selectAll_qt",
                    type: 'POST',
                    async: false,
                    data: {welfare_id: id},
                    timeout: 10000,    //超时时间
                    dataType: 'json',
                    success: function (data) {
                        var list = data.list;
                        for (var i in list) {

                            html+='<td><center>'+(list[i].remarks==null?'<span style="color: #22A1B7">待充值</span>':list[i].remarks)+'</center></td>';
                            html+='<td>'+(list[i].handle_date==null?'<span style="color: #DB323E">待处理</span>':list[i].handle_date)+'</td>';

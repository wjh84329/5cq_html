 <body> 
  <div class="bg-dot left"></div>

   <div class="countdown-wrap">

      3

     正在跳转到首页... 
   </div> 
   <button class="jump-btn" id="jumpNowBtn">立即跳转</button> 
  </div> 
  <script>
    function getUrlParam(name) {
        var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
        var r = window.location.search.substr(1).match(reg);
        if (r != null) return decodeURIComponent(r[2]);
        return "";
    }

    var upId = getUrlParam("up_id");
    var redirectTo = "/index.html";
    var count = 3;
    var timer = null;
    var hasHandled = false;

    var lastReportedUpId = sessionStorage.getItem("invite_reported_up_id") || "";
    var shouldReport = !!upId && upId !== lastReportedUpId;

    if (upId) {
        sessionStorage.setItem("invite_up_id", upId);
    }

      function reportAndJump(triggerType) {
        if (hasHandled) return;
        hasHandled = true;

        if (timer) {
        clearInterval(timer);
        }

        if (!shouldReport) {
        window.location.replace(redirectTo);
        return;
        }

        $.ajax({
            type: "POST",
            url: "https://hz.5cq.net/cq/user/setCoinShare",
            dataType: "json",
            data: {
                id: upId || "",
            },
            success: function (res) {
                sessionStorage.setItem("invite_reported_up_id", upId);
            },
            complete: function () {
                window.location.replace(redirectTo);
            }
        });
    }

    function startCountdown() {
      $("#countNum").text(count);

      timer = setInterval(function () {
        count -= 1;
        if (count <= 0) {
          $("#countNum").text(0);
          reportAndJump("auto");
          return;
        }
        $("#countNum").text(count);
      }, 1000);
    }

    $("#jumpNowBtn").on("click", function () {
      reportAndJump("manual");
    });

    startCountdown();
  </script>  
 </body>

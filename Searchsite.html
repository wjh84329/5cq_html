  <script>
    $(document).ready(function () {
        var url = getUrlParam('url')
        /* var ip = $.cookie('ip_'+encodeURIComponent(url))
         var host = $.cookie('host_'+encodeURIComponent(url))
         var id = $.cookie('id_'+encodeURIComponent(url))
      console.log(host)*/
        var id = sessionStorage.getItem('urlid')
        var ip = sessionStorage.getItem('urlip')
        var host = sessionStorage.getItem('urlhost')

        var formdata = new FormData();
        formdata.append('url', url);
        formdata.append('ip', ip);
        formdata.append('host', host);
        formdata.append('id', id);

        $.ajax({

            //返回相同的session
            url: baseUrl + 'report/selectReportByNameOrDate',

            type: 'POST',

            data: formdata,

            processData: false,

            contentType: false,

            timeout: 10000,    //超时时间

            dataType: 'json',

            success: function (data, textStatus, jqXHR) {

                // console.log(data)
                selectReportByNameOrDateInit(data, url);

            },

            error: function (xhr, textStatus) {

                result = JSON.parse('{"flag":false,"message":"showHtml-ajax-请求连接异常"}');

            }

        });


    })

    //获取url参数
    function getUrlParam(str) {
        // 获取当前页面的URL查询字符串部分
        const queryString = window.location.search;

        // 创建一个URLSearchParams对象来解析查询字符串
        const params = new URLSearchParams(queryString);

        // 获取id参数的值
        const data = params.get(str);

        return data;
    }

    function selectReportByNameOrDateInit(result, url) {
        console.log(url)
        var ZHData = result.ZHData;
        if (ZHData != null) {

            var html = '';

            var num = parseFloat(0);

            for (var i = 0; i < ZHData.length; i++) {

                html += '<tr>';

                html += '<td>' + ((ZHData[i].website).replace("http://", "").replace("https://", "").replace("www.", "").replace("/", "")) + '</td>';

                html += '<td class="icon-combined-shape-copy" data-num="' + ZHData[i].thnum + '">' + ZHData[i].th + '</td>';

                html += '<td class="icon-combined-shape-copy" data-num="' + ZHData[i].gsnum + '">' + ZHData[i].gs + '</td>';

                html += '<td class="icon-combined-shape-copy" data-num="' + ZHData[i].txnum + '">' + ZHData[i].tx + '</td>';

                html += '<td class="icon-combined-shape-copy" data-num="' + ZHData[i].txgdnum + '">' + ZHData[i].txgd + '</td>';

                html += '<td class="icon-combined-shape-copy" data-num="' + ZHData[i].jpnum + '">' + ZHData[i].jp + '</td>';

                html += '<td class="icon-combined-shape-copy" data-num="' + ZHData[i].qthnum + '">' + ZHData[i].qth + '</td>';

                html += '<td>' + ZHData[i].zj + '</td>';

                html += '</tr>';

                num += parseFloat(ZHData[i].zj);

            }

            html += '<tr><td colspan="8">截止当前广告总价:' + num + '</td></tr>';

            $('#ZHselectReportByNameOrDateTableTB').html(html);
            $(".icon-combined-shape-copy").hover(
                function () {
                    var num = $(this).data('num');
                    layer.tips('数量：' + num, this);
                }, function () {
                    // console.log('离开')
                    layer.closeAll();
                }
            )

            $("#loding_box").hide();

            JRData(result.JRData);

            DateData(result.pmList, result.DateData, result.pm);

            DetailsByName(result.DetailsByName);
            iplist(result.iplist, url)
            hostlist(result.hostlist, url)
            $('#selectReportByNameOrDate').show();

    function iplist(iplist, url) {

<button class="toggle-btn"

        style="margin-left:20px;padding:2px 10px;background:#fff;color:#d33f3f;border:none;border-radius:3px">
    显示全部
</button>`;
            var html = '';
            $('#iplist').html('')
            $('#iplisthead').html(headhtml)
            $.each(iplist, function (index, item) {
                html += `<tr>
                        <td class="tdclass">${item.name}</td>
                        <td class="tdclass">${item.ipname}</td>
                        <td class="tdclass">${item.line}</td>

                    </tr>`
            })
            $('#iplist').html(html)

        // $('#iplist tr:not(:first-child)').hide();

    function DateData(pmList, data, pm) {

        var html = '<th>站点/日期</th>';
        for (var i = 0; i < 8; i++) {
            var mydate = new Date(getDay(i));
            var m = mydate.getMonth() + 1
            var k = (m < 10 ? "0" + m : m) + '月' + (mydate.getDate() < 10 ? "0" + mydate.getDate() : mydate.getDate()) + '日';
            html += '<th class="dth' + i + '">' + k + '</th>';
        }
        html += '<th>合计</th>'
        html += '<th>广告总价排名</th>'
        html += '<th>发布站总广告数</th>'
        $('#selectDateNameHZTH').html(html);
        var dataHtml = '';
        for (var v in data) {
            var base = data[v].baseurl;
            dataHtml += '<tr><td>' + base + '</td>';
            var infos = data[v].infos;
            var money = 0;
            var datetimes = new Map();
            var datenums = new Map();
            for (var l in infos) {
                datetimes.set(infos[l].atime, infos[l].contexts);
                datenums.set(infos[l].atime, infos[l].num);
            }
            for (var i = 0; i < 8; i++) {
                var mydate = new Date(getDay(i));
                var m = mydate.getMonth() + 1
                var k = (m < 10 ? "0" + m : m) + '-' + (mydate.getDate() < 10 ? "0" + mydate.getDate() : mydate.getDate());
                var num = datenums.get(k) ? datenums.get(k) : 0
                if (datetimes.get(k) != null && datetimes.get(k) != '') {
                    money += parseFloat(datetimes.get(k));
                    dataHtml += '<td class="dtd' + i + ' icon-combined-shape-copy" data-num="' + num + '">' + datetimes.get(k) + '</td>'
                } else {
                    money += parseFloat(0);
                    dataHtml += '<td class="dtd' + i + ' icon-combined-shape-copy" data-num="' + num + '">0</td>'
                }
            }
            dataHtml += '<td class="moneyCount" data-count="' + parseFloat(money) + '">' + parseFloat(money) + '</td>';
            for (var v in pmList) {
                // console.log(pmList[v])
                if (pmList[v] && pmList[v].baseurl && pmList[v].baseurl.indexOf(base) > -1) {
                    if (pmList[v].count != '---') {
                        dataHtml += '<td>第' + pmList[v].count + '名</td>';
                    } else {
                        dataHtml += '<td><img style="display:block;margin: auto"  src="/statics/images/hot.gif" class="icon"></td>';
                    }
                    dataHtml += '<td class="totalZ" data-count="' + pmList[v].totalcount + '">共' + pmList[v].totalcount + '个</td>';
                    break;
                }
                /*else {
                 dataHtml += '<td>无</td>';
                 dataHtml += '<td class="totalZ" data-count="' + pmList[v].totalcount + '">无</td>';
                }*/
            }
            dataHtml += '</tr>';
        }
        $('#selectDateNameHZTB').html(dataHtml);
        for (var i = 0; i < 8; i++) {
            var total = 0;
            $(".dtd" + i).each(function () {
                total += parseFloat($(this).text());
            })
            if (total == 0) {
                $(".dtd" + i).remove();
                $(".dth" + i).remove();
            }
        }
        var dataHtml = $('#selectDateNameHZTB').html();

        dataHtml += '<tr>';
        dataHtml += '<td>统计</td>';
        for (var i = 0; i < 8; i++) {
            var total = 0;
            $(".dtd" + i).each(function () {
                total += parseFloat($(this).text());
            })
            if (total == 0) {
                $(".dtd" + i).remove();
                $(".dth" + i).remove();
            } else {
                dataHtml += '<td>' + total + '</td>';
            }
        }
        var count = 0;
        $('.totalZ').each(function () {
            count += Number($(this).data('count'));
        })
        var moneyCount = 0;
        $('.moneyCount').each(function () {
            moneyCount += Number($(this).data('count'));
        })
        dataHtml += '<td>' + moneyCount + '</td>';
        dataHtml += '<td>' + (pm == null ? '未排名' : '总排名第' + pm + '名') + '</td>';
        dataHtml += '<td>共' + count + '个</td>';
        dataHtml += '</tr>';
        $('#selectDateNameHZTB').html(dataHtml);
        $(".icon-combined-shape-copy").hover(
            function () {
                var num = $(this).data('num');
                layer.tips('数量：' + num, this);
            }, function () {
                // console.log('离开')
                layer.closeAll();
            }
        )

    }

    function toggleRows(tableId, button) {
        const table = document.getElementById(tableId);
        const rows = table.getElementsByTagName('tr');
        let shouldShow = button.textContent.includes('显示');

        // 从第二行开始切换（保留表头）
        for (let i = 1; i < rows.length; i++) {
            rows[i].style.display = shouldShow ? 'table-row' : 'none';
        }

        // 切换按钮状态
        button.textContent = shouldShow ? '收起列表' : '显示全部';
        button.style.backgroundColor = shouldShow ? '#4CAF50' : '#fff';
        button.style.color = shouldShow ? 'white' : '#d33f3f';
    }

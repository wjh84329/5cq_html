<html lang="en">
 <head> 
  <meta charset="utf-8">

  <meta name="description" content="5CQ.Com传奇广告排行榜,传奇私服查询站,传奇资源站,好玩的传奇排名站,玩家最爱的新开传奇,GM最喜欢的传奇工具,传奇直播,传奇新开服,传奇相关尽在5CQ(玩传奇)">

  <meta name="renderer" content="webkit"> 
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"> 
    <meta name="viewport" content="width=1280, user-scalable=yes, viewport-fit=cover"> 
  <link rel="stylesheet" href="../layuiadmin/layui/css/layui.css" media="all"> 
  <link rel="stylesheet" href="../layuiadmin/style/admin.css" media="all"> 
    <style>
        html, body {
                min-width: 1280px;
                overflow-x: auto;
        }

        .layui-table-view {
                min-width: 1220px;
        }

    .layui-table-view .layui-table-body td {
        height: auto;
    }

    .layui-table-view .layui-table-body .layui-table-cell {
        height: auto;
        line-height: 1.8;
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
        padding-top: 8px;
        padding-bottom: 8px;
    }

    .money-mark {
        line-height: 1.8;
        white-space: normal;
        word-break: break-all;
    }

    .money-mark-title {
        color: #1e9fff;
        font-weight: bold;
    }
  </style> 
 </head> 
 <body> 
  <table class="" id="auth-table" lay-filter="auth-table"></table> 
  <script src="../layuiadmin/layui/layui.js"></script> 
  <script>
    var user = JSON.parse(window.localStorage.getItem("vipuser"));
    layui.config({
        base: '../../layuiadmin/'
    }).extend({
        index: 'lib/index'
    }).use(['index', 'table', 'formgs', 'form', 'security', 'layer', 'upload', 'laydate'], function(){
        var $ = layui.jquery,
            admin = layui.admin,
            table = layui.table,
            formgs = layui.formgs,
            form = layui.form,
            laydate = layui.laydate,
            upload = layui.upload,
            layer = layui.layer, closeindex;

        function renderMoneyMark(mark) {
            var text = mark || '';
            var lines = text.split(/\r?\n/);
            var firstLine = lines[0] || '';
            var restLines = lines.slice(1);
            var html = '<div class="money-mark">';

            if (firstLine) {
                html += '<div class="money-mark-title">' + firstLine + '</div>';
            }

            for (var i = 0; i < restLines.length; i++) {
                if (restLines[i]) {
                    html += '<div>' + restLines[i] + '</div>';
                }
            }

            html += '</div>';
            return html;
        }

        table.render({
            elem: '#auth-table',
            url: layui.setter.url + 'selectMoneyogin',
            title: '充值/消费记录',
            cols: [[
                {
                    field: 'mark',
                    title: '消费描述',
                    minWidth: 320,
                    templet: function (data) {
                        return renderMoneyMark(data.mark);
                    }
                },
                {field: 'oldmoney', title: '消费/充值前金额', sort: false, width: 160},
                {field: 'newmoney', title: '消费/充值后金额', sort: false, width: 160},
                {field: 'dateTime', title: '消费/充值时间', sort: false, width: 180},
                {
                    title: '金额',
                    width: 120,
                    sort: false,
                    templet: function (data) {
                        if (data.code == 1) {
                            return '<a style="color: green">' + data.money + '</a>';
                        } else if (data.code == 2) {
                            return '<a style="color: red">' + data.money + '</a>';
                        }
                        return data.money || '';
                    }
                }
            ]],
            page: true,
            where: {token: localStorage.getItem('vipvtoken')}
        });
    })
  </script>  
 </body>
</html>

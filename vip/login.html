 <body> 
  <div name="loginform"> 
   <div class="box"> 
    <table width="100%" border="0" class="form"> 
     <tbody> 
      <tr> 
       <td style=" border-bottom:solid 1px #248AB3;"><h1>会员登录</h1></td> 
      </tr> 
      <tr> 
       <td> 
        <table width="100%" border="0" align="center"> 
         <tbody> 
          <tr> 
           <th width="120" style="color: white">登录账号</th> 
           <td width="250"><input name="username" type="text" size="20" class="txt" autocomplete="off"> </td> 
           <td></td> 
          </tr> 
          <tr> 
           <th style="color: white;">登录密码</th> 
           <td><input type="password" name="password" id="password" size="20" class="txt" autocomplete="off"></td> 
           <td></td> 
          </tr> 
          <tr> 
           <th style="color: white">验证码</th> 
           <td> 
            <table width="100%" border="0" class="codetable"> 
             <tbody> 
              <tr> 
               <td width="130"><input type="text" name="vcode" maxlength="4" class="txt" style="width:100px;" autocomplete="off"></td> 
               <td align="left"><img id="LAY-user-get-vercode" src="https://www.oschina.net/action/user/captcha" height="35" border="0"></td> 
              </tr> 
             </tbody> 
            </table> </td> 
           <td></td> 
          </tr> 
          <tr> 
           <td>&nbsp;</td> 
           <td><input type="button" name="Submit" id="login" value="登录" class="button"></td> 
           <td></td> 
          </tr>

  <script src="../statics/js/jquery-3.2.1.min.js"></script> 
  <script src="../statics/layui/layui.js"></script> 
  <script>
    layui.use(['layer', 'laydate'], function(){
        var $ = layui.$
            ,admin = layui.admin
            ,form = layui.form
            ,layer = layui.layer;

        // var url = 'http://localhost:8086/server/'
        // var url = 'http://jaxone.5cq.com/server/'
        var url = 'http://localhost:8086/server/'

        $.post(url+'common/vipcaptcha').done(function (res) {
            $("#LAY-user-get-vercode").attr("src",res.data.vipcode);
            window.localStorage.removeItem("vipvtoken");
            window.localStorage.setItem("vipvtoken",res.data.viptoken)
        })

        /*admin.req({
            url:layui.setter.url+'common/vipcaptcha'
        }).done(function (res) {
            $("#LAY-user-get-vercode").attr("src",res.data.vipcode);
            window.localStorage.removeItem("vipvtoken");
            window.localStorage.setItem("vipvtoken",res.data.viptoken)
        })*/

        $('#login').click(function () {
            var username = $('input[name=username]').val();
            var password = $('input[name=password]').val();
            var vcode = $('input[name=vcode]').val();
            var vtoken = window.localStorage.getItem("vipvtoken");
            // console.log(vtoken)
            if (username == '' || password == '' || vcode == '') {
                layer.msg('请填写完整信息', {icon: 2});
                return false;
            }
            $.post(
                url+'viplogin',
                {
                    username:username,
                    password:password,
                    vercode:vcode,
                    vtoken:vtoken
                },
                function (res) {
                    if(res.code == 0) {
                        window.localStorage.setItem("vipuser",JSON.stringify(res.data));
                        layer.msg('登入成功', {
                            offset: '15px'
                            ,icon: 1
                            ,time: 1000
                        }, function() {
                            location.href = './index.html'; //后台主页
                        })
                    }else {
                        layer.msg(res.msg, {icon: 2});
                        return false;
                    }
                }
            )
        })
        //刷新验证码
        $('#LAY-user-get-vercode').click(function () {
            $.post(url+'common/vipcaptcha',function (res) {
                $("#LAY-user-get-vercode").attr("src",res.data.vipcode);
                window.localStorage.removeItem("vipvtoken");
                window.localStorage.setItem("vipvtoken",res.data.viptoken)
            })
        })
    });
</script>

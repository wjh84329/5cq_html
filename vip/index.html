  <script>
    function adjustIframeHeight(iframeId) {
        var iframe = document.getElementById(iframeId);
        if (iframe) {
            try {
                var iframeDoc = iframe.contentWindow || iframe.contentDocument;
                if (iframeDoc.document) {
                    iframeDoc = iframeDoc.document; // For IE
                }
                // 修改高度计算部分
                var body = iframeDoc.body;
                var html = iframeDoc.documentElement;
                var height = Math.max(
                    body.scrollHeight, body.offsetHeight,
                    html.clientHeight, html.scrollHeight, html.offsetHeight
                );
                // 添加缓冲（例如10px）
                // iframe.style.height = (height + 10) + 'px';
                iframe.style.overflow = 'hidden';
            } catch (ex) {
                console.log("Error: " + ex.message);
            }
        }
    }
    //JS
    layui.use(['element', 'layer', 'util'], function () {

        var url = 'https://kkw.5cq.com/server/'

        var user = JSON.parse(window.localStorage.getItem("vipuser"));
        if(user == null){
            window.top.location.href='./login.html'; //到登录页面
            return;
        }
        $.post(url + 'getUserInfogin', {token: localStorage.getItem('vipvtoken')}, function (res) {
            if(res.code != 0){
                window.top.location.href='./login.html'; //到登录页面
                return;
            }
        })

        //左侧菜单点击事件
        $('.link-active').on('click', function () {
            $('.link-active').removeClass('active')
            $(this).addClass('active')
            var url = $(this).attr("lay-href")
            var iframe = $('#frm1')[0]; // 获取iframe的DOM元素
            iframe.onload = function() { // 设置onload事件
                adjustIframeHeight('frm1'); // iframe加载完成后调整高度
            };
            $('#frm1').attr("src",url)
            // adjustIframeHeight('frm1')

        });
        //顶部菜单栏事件
        $('.header-active').on('click', function () {
            var url = $(this).attr("lay-href")
            var iframe = $('#frm1')[0]; // 获取iframe的DOM元素
            iframe.onload = function() { // 设置onload事件
                adjustIframeHeight('frm1'); // iframe加载完成后调整高度
            };
            $('#frm1').attr("src",url)
            // adjustIframeHeight('frm1')

        });

        $('#left').click(function () {
            $('#left').css('display','none')
            $('#right').css('display','block')
        })
        $('#right').click(function () {
            $('#right').css('display','none')
            $('#left').css('display','block')
        })
        $('#editpwd').click(function () {
            var url = $(this).attr("lay-href")
            var iframe = $('#frm1')[0]; // 获取iframe的DOM元素
            iframe.onload = function() { // 设置onload事件
                adjustIframeHeight('frm1'); // iframe加载完成后调整高度
            };
            $('#frm1').attr("src",url)
        })
        $('#logout').click(function () {
            window.localStorage.setItem("vipuser",null);
            window.top.location.href='./login.html'; //到登录页面
        })
    });

    function getFormattedDate() {
        var date = new Date();
        var year = date.getFullYear();
        var month = ("0" + (date.getMonth() + 1)).slice(-2); // Months are zero based, thus add leading 0 and slice last 2 digits
        var day = ("0" + date.getDate()).slice(-2); // Add leading 0 and slice last 2 digits
        return year + "-" + month + "-" + day;
    }

    function getFormattedDateTime(date) {
        var currentDate = date || new Date();
        var year = currentDate.getFullYear();
        var month = ("0" + (currentDate.getMonth() + 1)).slice(-2);
        var day = ("0" + currentDate.getDate()).slice(-2);
        var hours = ("0" + currentDate.getHours()).slice(-2);
        var minutes = ("0" + currentDate.getMinutes()).slice(-2);
        var seconds = ("0" + currentDate.getSeconds()).slice(-2);
        return year + "-" + month + "-" + day + " " + hours + ":" + minutes + ":" + seconds;
    }

    function parseDateTime(dateTimeStr) {
        if (!dateTimeStr) {
            return null;
        }
        return new Date(dateTimeStr.replace(/-/g, '/'));
    }

    layui.config({
        base: '../../../layuiadmin/' //静态资源所在路径

        // initType();
        initPrice();

        function initType(){
            admin.req({
                url: layui.setter.url + 'jax/publishType/selectAll',

                contentType: "application/json",

                    arr = res.data;
                }
            })
        }


        function initPrice(){
            admin.req({
                url: layui.setter.url + 'getUserInfogin' //实际使用请改成服务端真实接口
                ,data:{
                    token: localStorage.getItem('vipvtoken')
                },
                done: function (res) {
                    price = res.data;
                }
            })
        }
        table.render({
            elem: '#auth-table'
            , url: layui.setter.url + 'selectAdogin'
            , title: '私服发布'
            , cols: [[
                {type: 'checkbox'}
                , {field: 'name', title: '服务器名',}
                , {field: 'startdate', title: '开始时间', sort: false, width: 200,}
                , {field: 'enddate', title: '结束时间', sort: false, width: 200,}
                , {title: '时间状态', width: 220, sort: false, templet: function (data) {
                        if(data.state==0){
                            if(new Date(data.enddate)<new Date()){
                                return `<a style="color: red">已过期</a>`;
                            }else{
                                // 设定目标时间
                                const targetDate = new Date(data.enddate); // 注意：日期字符串需要是ISO格式或者能被Date正确解析的格式
                                //开始时间
                                const startDate = new Date(data.startdate);
                                if(new Date() < startDate){
                                    //计算两个时间之间的差值（毫秒）
                                    const difference = startDate - new Date();
                                    //转换差值到天数、小时数和分钟数
                                    const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                                    const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                                    const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                                    return `<a style="color: black">${days}天${hours}小时${minutes}分钟后开始</a>`;
                                }
                                // 获取当前时间
                                const now = new Date();
                                // 计算两个时间之间的差值（毫秒）
                                const difference = targetDate - now;
                                // 转换差值到天数、小时数和分钟数
                                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                                return `<a style="color: green">${days}天${hours}小时${minutes}分钟后结束</a>`;
                            }
                        }else if(data.state==1){
                            return `<a style="color: grey">广告不显示</a>`;
                        }else if(data.state==2){
                            return `<a style="color: deeppink">广告已撤销</a>`;
                        }else if(data.state==3){
                            return `<a style="color: blue">广告暂停中</a>`;
                        }
                    }

                        }else if(data.state==1){

                        }else if(data.state==2){
                            return `<a style="color: deeppink">撤销</a>`;
                        }else if(data.state==3){
                            return `<a style="color: blue">暂停</a>`;
                        }else {

        form.on('submit(submit-reserve-pause)', function (data) {
            var field = data.field || {};
            var reservePauseDate = parseDateTime(field.reservePauseTime);
            var reserveStartDate = parseDateTime(field.reserveStartTime);
            var now = new Date();
            // 判断当前是否是已暂停状态（暂停时间为只读，说明是已有的暂停记录）
            var isAlreadyPaused = $('#reservePauseTime').prop('readonly');

            if (!reservePauseDate || isNaN(reservePauseDate.getTime())) {
                layer.msg('请输入正确的暂停时间');
                return false;
            }

            // 已暂停状态下，暂停时间是历史记录，跳过"必须大于当前时间"的验证
            if (!isAlreadyPaused && reservePauseDate.getTime() <= now.getTime()) {
                layer.msg('预约暂停时间必须大于当前时间');
                return false;
            }

            // 已暂停状态下，开启时间为必填
            if (isAlreadyPaused && !field.reserveStartTime) {
                layer.msg('已暂停的广告，开启时间为必填');
                return false;
            }

            if (field.reserveStartTime) {
                if (!reserveStartDate || isNaN(reserveStartDate.getTime())) {
                    layer.msg('请输入正确的开启时间');
                    return false;
                }

                // 已暂停状态下，开启时间只要大于当前时间即可
                if (isAlreadyPaused) {
                    if (reserveStartDate.getTime() <= now.getTime()) {
                        layer.msg('预约开始时间必须大于当前时间');
                        return false;
                    }
                } else {
                    if (reserveStartDate.getTime() <= reservePauseDate.getTime()) {
                        layer.msg('预约开始时间必须大于预约暂停时间');
                        return false;
                    }
                }
            }

            var payload = {
                id: field.id,
                reservePauseTime: field.reservePauseTime
            };

            if (field.reserveStartTime) {
                payload.reserveStartTime = field.reserveStartTime;
            }

            admin.req({
                url: layui.setter.url + 'ranking/reservePause',
                type: 'POST',
                processData: false,
                traditonal: true,
                contentType: 'application/json',
                data: JSON.stringify(payload),
                done: function (res) {
                    layer.msg(res.msg);
                    if (res && res.code === 0) {
                        if (reservePauseLayerIndex) {
                            layer.close(reservePauseLayerIndex);
                            reservePauseLayerIndex = null;
                        }
                        table.reload('auth-table');
                    }
                }
            });
            return false;
        });

    function spArr(arrv, num) { //arr是你要分割的数组，num是以几个为一组
        let newArr = [] //首先创建一个新的空数组。用来存放分割好的数组
        for (let i = 0; i < arrv.length;) { //注意：这里与for循环不太一样的是，没有i++
            newArr.push(arrv.slice(i, i += num));
        }

  <script src="../layuiadmin/layui/layui.js"></script>

  <script>
    layui.config({
        base: '../../layuiadmin/' //静态资源所在路径
    }).extend({
        index: 'lib/index', //主入口模块
    }).use(['index', 'table', 'formgs', 'form', 'security', 'layer', 'upload', 'laydate'], function(){
        var $ = layui.jquery,
            form = layui.form,
            admin = layui.admin;
        // layui.setter.url = 'http://localhost:8086/server/'
        var user = JSON.parse(window.localStorage.getItem("vipuser"));
        $('#loginname').text(user.login_name)
        form.on('submit(setmypass)', function () {
            var oldpassword=$("#oldpassword").val();
            var newpassword=$("#password").val();
            var url = layui.setter.url + "checkPasswordogin";
            $.post(
                url,
                {
                    oldpassword: oldpassword,
                    token: localStorage.getItem('vipvtoken')
                },
                function (res) {
                    if (res.code!= 0) {
                        layer.msg(res.msg);
                    } else {
                        $.post(
                            layui.setter.url + "updatePasswordogin",
                            {
                                newpassword: newpassword,
                                token: localStorage.getItem('vipvtoken')
                            },
                            function (res) {
                                layer.msg(res.msg, {
                                    offset: '15px'
                                    ,icon: 1
                                    ,time: 1000
                                }, function(){
                                    window.localStorage.setItem("vipuser",null);
                                    window.top.location.href='./login.html'; //到登录页面
                                });
                            }
                        )
                    }
                }
            )

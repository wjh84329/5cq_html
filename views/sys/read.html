<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>查看发布</title>
    <link rel="stylesheet" href="../../layuiadmin/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../../layuiadmin/style/admin.css" media="all">
</head>
<body>

<table id="auth-table" lay-filter="auth-table"></table>
<div id="auth-state" hidden>
    <button lay-event="update" class="layui-btn layui-btn-primary layui-btn-xs"><i
            class="layui-icon">&#xe642;</i>修改
    </button>
    <button lay-event="remove" class="layui-btn layui-btn-primary layui-btn-xs"><i
            class="layui-icon">&#xe640;</i>删除
    </button>
</div>
<div id="layui-publish-update" hidden>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-body" style="padding: 15px;">
                <form class="layui-form" id="layui-form-publish-update" lay-filter="component-form-group">
                    <input type="hidden" name="id">
                    <div class="layui-form-item">
                        <div class="layui-form-item layui-form-text"
                             style="margin-top: -30px;margin-left: 70%;margin-bottom:0px">
                            <label class="layui-form-label" style="font-weight: bold">快速发布</label>
                        </div>
                    </div>
                    <div class="layui-form-item layui-form-text">
                        <label class="layui-form-label" style="font-weight: bold;margin-top: 135px;">广告内容</label>
                        <div class="layui-input-block" style="margin-left: 0px;float: left;width: 43%;">
                            <textarea name="text" placeholder="请输入内容" class="layui-textarea"
                                      style="resize: none;height: 300px;"></textarea>
                        </div>

                        <div class="layui-input-block" style="margin-left: 0px;float: right;width: 45%;">
                            <textarea readonly name="text_p" class="layui-textarea" ondblclick="jqb(this)"
                                      style="cursor:pointer;text-decoration:none;resize: none;height: 300px; border-style: none"></textarea>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">选择类型</label>
                            <div class="layui-input-inline" style="width: 182px;">
                                <select name="type" lay-verify="required" lay-filter="update-type">
                                </select>
                            </div>
                            <label class="layui-form-label">单价</label>
                            <div class="layui-input-inline">
                                <input type="text" name="price" readonly lay-verify="required" placeholder="请输入价格"
                                       class="layui-input">
                            </div>

                        </div>

                    </div>
                    <div class="layui-form-item layui-form-text">
                        <label class="layui-form-label">开始时间</label>
                        <div class="layui-input-inline">
                            <input type="text" name="startdate" id="startdate_update" readonly autocomplete="off"
                                   lay-verify="required" placeholder="开始时间" class="layui-input">
                        </div>
                        <label class="layui-form-label">广告天数</label>
                        <div class="layui-input-inline">
                            <input type="text" name="days" lay-verify="required" placeholder="广告天数"
                                   onkeyup="if(this.value.length==1){this.value=this.value.replace(/[^1-9]/g,'')}else{this.value=this.value.replace(/\D/g,'')}"
                                   onafterpaste="if(this.value.length==1){this.value=this.value.replace(/[^1-9]/g,'')}else{this.value=this.value.replace(/\D/g,'')}"
                                   class="layui-input">
                        </div>
                    </div>
                    <div class="layui-form-item layui-form-text">
                        <label class="layui-form-label">条数</label>
                        <div class="layui-input-inline">
                            <input type="text" name="nums" lay-verify="required" placeholder="条数"
                                   onkeyup="if(this.value.length==1){this.value=this.value.replace(/[^1-9]/g,'')}else{this.value=this.value.replace(/\D/g,'')}"
                                   onafterpaste="if(this.value.length==1){this.value=this.value.replace(/[^1-9]/g,'')}else{this.value=this.value.replace(/\D/g,'')}"
                                   class="layui-input">
                        </div>
                    </div>
                    <div class="layui-input-block">
                        <!--操作-->
                        <div class="layui-footer" id="update-publish-button" style="left: 0;">
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="../../layuiadmin/layui/layui.js"></script>
<script>
    function getQueryVariable(variable) {
        var query = window.location.search.substring(1);
        var vars = query.split("&");
        for (var i = 0; i < vars.length; i++) {
            var pair = vars[i].split("=");
            if (pair[0] == variable) {
                return pair[1];
            }
        }
        return (false);
    }
    function checkAttribute(data){
        if(data==null){
            data= "";
        }
        return data;
    }
    var arr = [];
    var user = JSON.parse(window.localStorage.getItem("user"));
    var price = '';
    // console.log(user)
    layui.config({
        base: '../../../layuiadmin/' //静态资源所在路径
    }).extend({
        index: 'lib/index', //主入口模块
    }).use(['index', 'table', 'formgs', 'form', 'security', 'layer', 'upload', 'laydate'], function(){
        var $ = layui.jquery,
            admin = layui.admin,
            table = layui.table,
            formgs = layui.formgs,
            form = layui.form,//控制添加修改（同一个弹出层）关闭弹出层的索引
            laydate = layui.laydate,
            upload = layui.upload,
            layer = layui.layer, closeindex;
        initType();
        initPrice();
        function initType(){
            admin.req({
                url: layui.setter.url + 'jax/publishType/selectAll',
                processData: false,
                traditonal: true,
                contentType: "application/json",
                done: function (res) {
                    arr = res.data;
                }
            })
        }
        function initPrice(){
            admin.req({
                url: layui.setter.url + 'webSite/selectOne/10000',
                done: function (res) {
                    price = res.data.daytopprice;
                }
            })
        }
        //第一个实例
        table.render({
            elem: '#auth-table'
            , url: layui.setter.url + 'publish/select'
            , title: '私服发布'
            , cols: [[
                // {type: 'checkbox', fixed: 'left'},
                /*{
                    field: 'type', title: '类型', sort: true, width: 130,
                    templet: function (obj) {
                        var name = '';
                        for (var i = 0; i < arr.length; i++) {
                            if (obj.type == arr[i].id) {
                                name = arr[i].name;
                                break;
                            }
                        }
                        return name;
                    }
                }*/
                {field: 'price', title: '单价', width: 130,}
                , {field: 'money', title: '总价', width: 130,}
                , {field: 'name', title: '私服名称',}
                , {field: 'ipname', title: '私服IP',}
                , {field: 'line', title: '线路',}
                , {field: 'versiondepict', title: '版本介绍', }
                , {field: 'kfqq', title: '客服QQ', }
                // , {field: 'url', title: '私服地址', sort: true,}
                , {field: 'startdate', title: '开始时间', width: 180,}
                , {field: 'enddate', title: '结束时间',  width: 180,}
                , {field: 'nums', title: '条数',  width: 80}
                , {fixed: 'right', title: '操作', toolbar: '#auth-state',width:160}
            ]]
            , page: true
            , where: {userID: getQueryVariable('id'),roleID: 44}
        });
        table.on('tool(auth-table)', function (obj) {
            if (obj.event == "remove") {
                layer.confirm('确定要删除【' + obj.data.name + '】这个私服吗？', function (index) {
                    admin.req({
                        url: layui.setter.url + "publish/remove/" + obj.data.id
                    }).done(function (res) {
                        layer.close(index);
                        table.reload('auth-table');
                        layer.msg(res.msg);
                    })
                });
            }else if (obj.event == "update") {
                layer.open({
                    type: 1,//弹窗类型
                    area: ['1200px', '660px'],
                    title: ("修改发布私服"),
                    shadeClose: false,
                    content: $("#layui-publish-update"),
                    success: function (index, layero) {
                        closeindex = layero;
                        formgs.reset('layui-form-publish-update');
                        var date = new Date(obj.data.startdate)
                        obj.data.startdate = date.getFullYear() + "-" + (date.getMonth() + 1).toString().padStart(2, '0') + "-" + date.getDate().toString().padStart(2, '0');
                        formgs.get("layui-form-publish-update", obj.data);
                        $("#layui-form-publish-update textarea[name='text_p']").val("" +
                            "服务器名:限8个汉字\n" +
                            "服务器IP:限8个汉字\n" +
                            "线路类型:限6个汉字\n" +
                            "版本介绍:限18个汉字\n" +
                            "客服QQ:限6个汉字\n" +
                            "主页地址:http://\n" +
                            "开区时间:2020-00-00 00:00\n" +
                            "投放站点:xxx\n");
                        var str='';
                        str+='服务器名:'+checkAttribute(obj.data.name)+"\n";
                        str+='服务器IP:'+checkAttribute(obj.data.ipname)+"\n";
                        str+='线路类型:'+checkAttribute(obj.data.line)+"\n";
                        str+='版本介绍:'+checkAttribute(obj.data.versiondepict)+"\n";
                        str+='客服QQ:'+checkAttribute(obj.data.kfqq)+"\n";
                        str+='主页地址:'+checkAttribute(obj.data.url)+"\n";
                        str+='开区时间:'+checkAttribute(obj.data.datetime)+"\n";
                        str+='投放站点:'+checkAttribute(obj.data.launch)+"\n";
                        $("#layui-form-publish-update textarea[name='text']").val(str);
                        var html = '';
                        for (var i = 0; i < arr.length; i++) {
                            if(arr[i].id==obj.data.type){
                                html += '<option value="' + arr[i].id + '" selected="selected">' + arr[i].name + '</option>';
                            }else{
                                html += '<option value="' + arr[i].id + '">' + arr[i].name + '</option>';
                            }
                        }
                        $("#layui-form-publish-update input[name='price']").val(price);
                        $("#layui-form-publish-update select[name='type']").html(html);
                        $("#update-publish-button").html($("#submit-form-update").html());
                        form.render();
                    },
                });
            }
        })
    });
</script>
</body>
</html>

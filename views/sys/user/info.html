<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>设置我的资料</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="../../../layuiadmin/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../../../layuiadmin/style/admin.css" media="all">
</head>
<body>

<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">设置我的资料</div>
                <form class="layui-form" id="layui-form-user-info" lay-filter="component-form-group">
                    <div class="layui-card-body">
                        <div class="layui-form" lay-filter="">
                            <div class="layui-form-item">
                                <label class="layui-form-label">姓名</label>
                                <div class="layui-input-inline">
                                    <input type="text" name="name" class="layui-input">
                                </div>
                            </div>
                            <!--<div class="layui-form-item">
                                <label class="layui-form-label">工号</label>
                                <div class="layui-input-inline">
                                    <input type="text" name="no" class="layui-input layui-disabled" readonly >
                                </div>
                            </div>-->
                            <!--<div class="layui-form-item">
                                <label class="layui-form-label">头像</label>
                                <div class="layui-input-inline">
                                    <input name="img"  id="LAY_avatarSrc" placeholder="图片地址"
                                           value="http://cdn.layui.com/avatar/168.jpg" class="layui-input">
                                </div>
                                <div class="layui-input-inline layui-btn-container" style="width: auto;">
                                    <button type="button" class="layui-btn layui-btn-primary" id="LAY_avatarUpload">
                                        <i class="layui-icon">&#xe67c;</i>上传图片
                                    </button>
                                    <button class="layui-btn layui-btn-primary" layadmin-event="avartatPreview">查看图片
                                    </button>
                                </div>
                            </div>-->
                            <div class="layui-form-item">
                                <label class="layui-form-label">手机</label>
                                <div class="layui-input-inline">
                                    <input type="text" name="phone" lay-verify="phone" autocomplete="off"
                                           class="layui-input">
                                </div>
                            </div>
                            <!--<div class="layui-form-item">
                                <label class="layui-form-label">电话</label>
                                <div class="layui-input-inline">
                                    <input type="text" name="phone" lay-verify="phone" autocomplete="off"
                                           class="layui-input">
                                </div>
                            </div>-->
                            <div class="layui-form-item">
                                <label class="layui-form-label">邮箱</label>
                                <div class="layui-input-inline">
                                    <input type="text" name="email" value="" lay-verify="email" autocomplete="off"
                                           class="layui-input">
                                </div>
                            </div>
                            <!--<div class="layui-form-item layui-form-text">
                                <label class="layui-form-label">备注</label>
                                <div class="layui-input-block">
                                    <textarea name="remarks" placeholder="请输入内容" class="layui-textarea"></textarea>
                                </div>
                            </div>-->
                            <div class="layui-form-item">
                                <div class="layui-input-block">
                                    <button class="layui-btn" lay-submit lay-filter="setmyinfo">确认修改</button>
                                    <!--<button type="reset" class="layui-btn layui-btn-primary">重新填写</button>-->
                                </div>
                            </div>
                        </div>

                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

<script src="../../../layuiadmin/layui/layui.js"></script>
<script>
    layui.config({
        base: '../../../layuiadmin/' //静态资源所在路径
    }).extend({
        index: 'lib/index' //主入口模块
    }).use(['index', 'set', 'form', 'formgs'], function () {
        var $ = layui.$, admin = layui.admin, form = layui.form, formgs = layui.formgs;
        admin.req({
            url: layui.setter.url + 'authc/getUserInfo' //实际使用请改成服务端真实接口
            , done: function (res) {
                formgs.get("layui-form-user-info", res.data);
            }
        })

        form.on('submit(setmyinfo)',function(data){
            console.log(data.field);
            var url =layui.setter.url + "authc/updateUserInfo/";
            admin.req({
                url: url,
                data: data.field,
                done: function (res) {
                    layer.msg(res.msg);
                }
            })
            return false
        })
    });
</script>
</body>
</html>

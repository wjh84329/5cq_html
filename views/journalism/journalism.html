<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>新闻列表</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="../../layuiadmin/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../../layuiadmin/style/admin.css" media="all">
  <script src="../../statics/js/jquery-3.2.1.min.js"></script>
  <script src="../../statics/js/jquery.cookie.js"></script>
    <style>
        .pre-text {
            white-space: pre;
        }
        .layui-form-select dl {
            z-index: 99999;
        }
    </style>
</head>
<body>

<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">新闻列表</div>
                <div class="layui-card-body">
                    <div class="test-table-reload-btn" style="margin-bottom: 10px;">
                        <div class="layui-inline">
                            <input class="layui-input" name="title" id="test-table-demoReload"
                                   autocomplete="off" placeholder="请输入新闻标题">
                        </div>

                        <button class="layui-btn" data-type="reload">搜索</button>
                        <button id="role-button-add" class="layui-btn"><i
                                class="layui-icon">&#xe654;</i>添加
                        </button>
                    </div>
                    <table class="layui-hide" id="auth-table" lay-filter="auth-table"></table>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="auth-state" hidden>
    <button lay-event="update"  class="layui-btn layui-btn-primary layui-btn-xs"><i
            class="layui-icon">&#xe642;</i>修改
    </button>
    <button lay-event="remove"  class="layui-btn layui-btn-primary layui-btn-xs"><i
            class="layui-icon">&#xe640;</i>删除
    </button>
</div>



<div id="layui-file-update" hidden>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-body" style="padding: 15px;">
                <form class="layui-form" id="layui-form-file-update" lay-filter="component-form-group">
                    <input type="text" id="filename" name="filename" hidden>
                    <textarea class="pre-text" id="fileInfo" name="fileInfo" wrap="hard" style="width: 100%;resize: none;"></textarea>
                    <div class="layui-footer" id="update-file-button" style="left: 0;">
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<!--update add-->
<div id="layui-role" hidden>
    <div class="layui-fluid" >
        <div class="layui-card">
            <div class="layui-card-body" style="padding: 15px;">
                <form class="layui-form" id="layui-form-role" lay-filter="component-form-group">
                    <input type="hidden" id="id" name="id">
                    <div class="layui-form-item">

                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">新闻标题：</label>
                            <div class="layui-input-inline">
                                <input type="text" id="title" name="title" lay-verify="required" placeholder="请输入新闻标题"
                                       class="layui-input">
                            </div>
                        </div>


                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">新闻图标：</label>
                            <!--<div class="layui-input-inline">-->
                                <!--&lt;!&ndash;<input type="file"  onchange="getFileLogo(this)"  id="test-upload-normal-LOGO" style="margin-right: 10px" />&ndash;&gt;-->
                                <!--<div onclick="handleSelectLogo()" style="margin-bottom: 10px;"  class="layui-btn">上传图标</div>-->
                                <!--</br>-->
                                <!--<img class="layui-upload-img" style="width: 160px;height: 120px;margin-top: 10px" id="test-upload-normal-img-LOGO">-->
                                <!--<p id="test-upload-LOGO"></p>-->
                            <!--</div>-->
                            <div class="layui-upload-list">
                                <div onclick="handleSelectLogo()" style="margin-bottom: 10px;"  class="layui-btn">上传图标</div>
                                </br>
                                <input type="file" onchange="getFileLogo(this)" id="test-upload-normal-LOGO" style="margin-right: 10px;display: none" /></br>
                                <img class="layui-upload-img"  id="test-upload-normal-img-LOGO" style="margin-top: 10px;max-height: 200px;max-width: 200px;margin-left: 110px">
                                <p id="test-upload-LOGO"></p>
                            </div>
                        </div>

                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">新闻简介：</label>
                            <div class="layui-input-block">
                                <input type="text" id="introduction" name="introduction" lay-verify="required" placeholder="请输入新闻简介"
                                       class="layui-input">
                            </div>
                        </div>

                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">类型：</label>
                            <div class="layui-input-inline" style="width: 182px">
                                <select name="type" lay-verify="required" id="gameType">
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">浏览次数：</label>
                            <div class="layui-input-inline" style="width: 182px">
                                <input type="text" id="locknum" name="locknum" lay-verify="required" placeholder="请输入浏览次数"
                                       class="layui-input" value="0">
                            </div>
                        </div>


                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">新闻内容：</label>
                            <!--<div class="layui-input-inline">-->
                                <!--<input type="text" id="text" name="text" lay-verify="required" placeholder="请输入新闻内容"-->
                                       <!--class="layui-input">-->
                            <!--</div>-->
                            <div class="layui-form-item layui-form-text">
                                <div class="layui-input-block">
                                    <div id="div3"></div>
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="layui-input-block">
                        <!--操作-->
                        <div class="layui-footer" id="submit-form-menu-button" style="left: 0;">

                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<!--添加-->
<div id="submit-form-add" hidden>
    <button class="layui-btn" shiro-event="jax:journalism:add"  lay-submit lay-filter="submit-form-own">立即提交</button><!--添加-->
    <button type="reset"  class="layui-btn layui-btn-primary">重置</button><!--添加-->
</div>

<!--修改-->
<div id="submit-form-update" hidden>
    <button class="layui-btn"  shiro-event="jax:journalism:update" lay-submit lay-filter="submit-form-edit">立即提交</button>
</div>

<script src="../../layuiadmin/layui/layui.js"></script>
<script src="../../statics/wangEditor-3.1.1/release/wangEditor.js"></script>
<script>
  //获取文件
  function getFileLogo(f){
    upImg1();
  }

  //Logo图片上传
  function handleSelectLogo(){
      $("#test-upload-normal-LOGO").click();
  }

  //图片上传
  var fileImgLogo='';
  function upImg1() {
    var imgList=document.getElementById('test-upload-normal-LOGO').files;
    var data = new FormData();//用ajax传递文件流必须用FormData，其他格式不可传递
    data.append("files", imgList[0], imgList[0].name);
    var example = location.protocol+"//"+window.location.host;
    data.append("weburl",example);
    data.append("type",'report');

    $.ajax({
      url: layui.setter.url + 'jax/uploadFile/upload',
      type: 'post',
      data: data,
      contentType: false,
      processData: false,
      dataType: 'json',
      async:false,
      success: function (res, textStatus, jqXHR) {
        fileImgLogo=res.data[0];
        $("#test-upload-normal-img-LOGO").attr("src", res.data);
      }
    })


  }
    layui.config({
        base: '../../../layuiadmin/' //静态资源所在路径
    }).extend({
        index: 'lib/index', //主入口模块
        treetable: '../treetable/treetable'
    }).use(['index', 'table','formgs','form','security','treetable', 'upload','layedit'], function () {
        var $ = layui.jquery,
            admin = layui.admin,
            table = layui.table,
            formgs = layui.formgs,
            form = layui.form,
            upload = layui.upload,
            treetable = layui.treetable,
            layedit = layui.layedit,//控制添加修改（同一个弹出层）关闭弹出层的索引
            closeindex;//控制添加修改（同一个弹出层）关闭弹出层的索引
        var E = window.wangEditor;
        var editor2 = new E('#div3');
        editor2.customConfig.uploadImgMaxSize = 3 * 700 * 700;
        editor2.customConfig.uploadImgMaxLength = 10;
        editor2.customConfig.uploadImgTimeout = 0;
        editor2.customConfig.uploadImgShowBase64 = true;
        editor2.customConfig.uploadImgHooks = {
            fail:function (xhr, editor, result) {
                //上传错误时触发
                alert("上传图片失败");
            }
        };
        editor2.create();

        table.render({
            elem: '#auth-table'
            ,url: layui.setter.url+'journalism/list'
            ,title: '新闻列表',
            parseData:function(res) {
                var data = res.data.data
                return {
                    "code" : res.code,  // 注意返回正确的状态码是0
                    "data": data,  // 格式： [{name:cocoli,age:21},{name:licy,age:60}]
                    "count":res.data.tnum,
                }
            }
            ,cols: [[
                {
                    field: 'icon', align:'center', title: 'icon',
                    templet: function (obj) {
                        if (obj.icon != '' && obj.icon != null) {
                            var t = obj.icon;
                            obj.icon = '<img  style="height:28px" onclick="tc(\'' + t + '\')"   src="' + t + '"/>';
                        }else{
                            obj.icon='暂无图片';
                        }
                        return obj.icon;
                    }
                },
                {field: 'title', title: '标题'},
                {field: 'text', title: '内容'},
                {field: 'introduction', title: '简介'},
                {field: 'typeName', title: '类型'},
                {field: 'releaseTime', title: '发布时间'},
                {fixed: 'right', title: '操作', toolbar: '#auth-state',width:160}
            ]]
            ,page: true
        });


        $.ajax({
            url: layui.setter.url + 'jax/jaxJournalismType/list',
            type: 'get',
            data:{page:1,limit:500},
            dataType: 'json',
            success: function (data, textStatus, jqXHR) {
                console.log(data,'这是游戏类型');
                var html='';
                for(var i=0;i<data.data.length;i++){
                    html+="<option value='"+data.data[i].id+"'>"+data.data[i].type_name+"</option>"
                    console.log(html)
                }
                $("#gameType").html(html);
            }
        })


        //打开修改
        table.on('tool(auth-table)', function (obj) {
            if (obj.event == 'update') {
                layui.use(['layer'], function () {
                    var layer = layui.layer, $ = layui.$;
                    layer.open({
                        type: 1,//弹窗类型
                        area: ['50%', '60%'],//定义宽和高
                        title: ('修改'),//题目
                        shadeClose: false,//点击遮罩层关闭
                        content: $("#layui-role"),//打开的内容
                        success: function (index, layero) {
                            formgs.get("layui-form-role", obj.data);
                            fileImgLogo='';
                            editor2.txt.html("");
                            editor2.txt.html(obj.data.text)
                            $("#submit-form-menu-button").html($("#submit-form-update").html());
                            //form.render刷新form 如果是针对单一刷新括号里面加上标签名 例：select刷新form.render('select')
                            console.log(obj.data.icon);
                            if(obj.data.icon==null){
                                $(".layui-upload-img").attr("src","");
                            }else {
                                $(".layui-upload-img").attr("src",obj.data.icon);
                            }
                            form.render();
                            closeindex = layero
                        },
                        end: function () {
                            //getTableData();//结束之后请求表格数据的方法，新编辑的数据直接存库并展示在页面
                        }
                    });
                })
            } else if (obj.event == "remove") {
                layer.confirm('确定要删除吗？', function (index) {
                    admin.req({
                        url:layui.setter.url+'journalism/delete?id='+obj.data.id,
                    }).done(function (res) {
                        layer.close(index);
                        table.reload('auth-table');
                        layer.msg(res.msg);
                    })
                });
            }
        })


        // 修改
        form.on('submit(submit-form-edit)', function (data) {
            data.field.text=editor2.txt.html();
            var url = layui.setter.url+'journalism/update';
            var formdata = new FormData();
            if(fileImgLogo!='') {
                formdata.append("icon", fileImgLogo);
            }
            formdata.append("id",data.field.id);
            formdata.append("title",data.field.title);
            formdata.append("introduction",data.field.introduction);
            formdata.append("text",data.field.text);
            formdata.append("locknum",data.field.locknum);
            formdata.append("type",data.field.type);
            admin.req({
                url: url,
                data: formdata,
                cache: false, //上传文件不需要缓存
                processData: false, // 告诉jQuery不要去处理发送的数据
                contentType: false, // 告诉jQuery不要去设置Content-Type请求头
                done: function (res) {
                    layer.close(closeindex);
                    table.reload("auth-table");
                    layer.msg(res.msg);
                    form.render();
                }
            })
            return false
        })


        //打开添加弹窗
        $("#role-button-add").on("click", function () {
            $("#layui-upload-img").attr("src","");
            layui.use(['layer'], function () {
                var layer = layui.layer, $ = layui.$;
                layer.open({
                    type: 1,
                    area: ['50%', '55%'],
                    title: ("添加菜单/按钮"),
                    shadeClose: false,
                    content: $("#layui-role"),
                    success: function (index, layero) {
                        formgs.reset('layui-role');
                        editor2.txt.html("");
                        $("#submit-form-menu-button").html($("#submit-form-add").html());
                        $(".layui-upload-img").attr("src","");
                        form.render();
                        closeindex = layero;
                    },
                });
            })
        })


        //添加
        form.on('submit(submit-form-own)', function (data) {
            data.field.text=editor2.txt.html();
            var url = layui.setter.url+'journalism/add';
            var formdata = new FormData();
            formdata.append("icon",fileImgLogo);
            formdata.append("title",data.field.title);
            formdata.append("introduction",data.field.introduction);
            formdata.append("text",data.field.text);
            formdata.append("type",data.field.type);
            // formdata.append("contact",data.field.contact);
            // formdata.append("releaseTime",data.field.releaseTime);
            admin.req({
                url: url,
                data: formdata,
                cache: false, //上传文件不需要缓存
                processData: false, // 告诉jQuery不要去处理发送的数据
                contentType: false, // 告诉jQuery不要去设置Content-Type请求头
                done: function (res) {
                    layer.close(closeindex);
                    table.reload("auth-table");
                    layer.msg(res.msg);
                    form.render();
                    $.get({url:layui.setter.url + "ranking/test"})
                }
            })
            return false
        })




        //查询
        var $ = layui.$, active = {
            reload: function(){
                var demoReload = $('#test-table-demoReload');
                //执行重载
                table.reload('auth-table', {
                    page: {curr: 1 }//重新从第 1 页开始
                    ,where: {title: $('#test-table-demoReload').val()}
                });
            }
        };

        $('.test-table-reload-btn .layui-btn').on('click', function(){
            var type = $(this).data('type');
            active[type] ? active[type].call(this) : '';
        });


        $('.test-table-reload-btn .layui-btn').on('click', function () {
            var type = $(this).data('type');
            active[type] ? active[type].call(this) : '';
        });
    });
</script>
</body>
</html>

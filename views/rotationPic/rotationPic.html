<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>轮播图管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="../../layuiadmin/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../../layuiadmin/style/admin.css" media="all">
</head>
<body>
<style>
    .layadmin-homepage-pad-ver {
        padding-top: 15px;
        padding-bottom: 15px;
    }

    .layadmin-homepage-pad-img {
        box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.1);
        border-radius: 50%;
    }

    .layui-table-cell {            overflow: visible !important;        }

    .layui-table-body {
        overflow: visible;
    }
    .layui-table td .layui-table-cell {
        line-height: 28px;
    }
    .layui-anim-upbit{
        position: absolute;
    }
    /* 调整高度 */
    td .layui-form-select {
        margin-top: -10px;
        margin-left: -15px;
        margin-right: -15px;
    }

    .layui-table-box{
        overflow: visible!important;
    }
    .layui-upload-img{width: 290px; height: 93px; margin: 0 10px 10px 0;}
</style>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">轮播图管理</div>
                <div class="layui-card-body">
                    <div class="test-table-reload-btn" style="margin-bottom: 10px;">
                        <div class="layui-inline">
                            <input class="layui-input" name="polymerization" id="test-table-demoReload"
                                   autocomplete="off" placeholder="快捷搜索">
                        </div>
                        <button class="layui-btn" data-type="reload">搜索</button>
                        <button id="resources-button-add" shiro-event="jax:resources:open-add" class="layui-btn"><i
                                class="layui-icon">&#xe654;</i>添加
                        </button>
                    </div>
                    <table class="layui-hide" id="auth-table" lay-filter="auth-table"></table>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="auth-state" hidden>
    <button lay-event="upload" shiro-event="jax:rotationPic:upload" class="layui-btn layui-btn-primary layui-btn-xs sss">
        <i class="layui-icon">&#xe642;</i>上传
    </button>
    <button lay-event="updateUsed" shiro-event="jax:rotationPic:updateUsed" class="layui-btn layui-btn-primary layui-btn-xs sss">
        <i class="layui-icon">&#xe642;</i>启用/停用
    </button>
    <button lay-event="remove" shiro-event="jax:rotationPic:open-delete" class="layui-btn layui-btn-primary layui-btn-xs">
        <i class="layui-icon">&#xe640;</i>删除
    </button>
</div>

<!--添加-->
<div id="submit-form-add" hidden>
    <button class="layui-btn" shiro-event="jax:rotationPic:add" lay-submit lay-filter="submit-form-resources">立即提交
    </button>
    <!--添加-->
    <button type="reset" shiro-event="jax:rotationPic:add-reset" class="layui-btn layui-btn-primary">重置</button><!--添加-->
</div>

<!--修改-->
<div id="submit-form-update" hidden>
    <button class="layui-btn" shiro-event="jax:rotationPic:update" lay-submit lay-filter="submit-form-resources">立即提交
    </button>
    <button type="reset" shiro-event="jax:rotationPic:update-reset" class="layui-btn layui-btn-primary">重置</button>
</div>
<div id="layui-resources" hidden>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-body" style="padding: 15px;">
                <form class="layui-form" id="layui-form-resources" lay-filter="component-form-group">
                    <div class="layui-form-item">
                        <input type="hidden" id="id" name="id">

                        <div>

                            <div style="width: 350px;float: left">
                                <div class="layui-form-item layui-form-text" >
                                    <label class="layui-form-label">图片名称</label>
                                    <div class="layui-input-inline" style="width: 212px">
                                        <input type="text" id="name" name="name" lay-verify="required" placeholder="请输入名称"
                                               class="layui-input">
                                    </div>
                                </div>
                                <div class="layui-form-item layui-form-text"  style="width: 340px">
                                    <label class="layui-form-label">排序</label>
                                    <div class="layui-input-inline" style="width: 212px">
                                        <input type="text" id="sort" name="sort" lay-verify="required|number" placeholder="排序"
                                               class="layui-input">
                                    </div>
                                </div>
                            </div>
                            <div style="width: 45%;float: right">
                                <div class="layui-card-body" style="padding: 0px 0px">
                                    <div class="layui-upload">
                                        <button type="button" class="layui-btn" id="test-upload-normal">上传图片</button>
                                        <div class="layui-upload-list">
                                            <img class="layui-upload-img" id="test-upload-normal-img">
                                            <p id="test-upload-demoText"></p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>


                        <div class="layui-form-item layui-form-text">

                        </div>
                        <div class="layui-input-block">
                            <!--操作-->
                            <div class="layui-footer" id="submit-form-resources-button" style="left: 0;">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>


<button style="display: none" type="button" class="layui-btn sss" id="test-upload-type1"><i class="layui-icon"></i>上传文件
</button>


<script src="../../layuiadmin/layui/layui.js"></script>
<script>
layui.config({
    base: '../../../layuiadmin/' //静态资源所在路径
}).extend({
    index: 'lib/index', //主入口模块
}).use(['index', 'table', 'formgs', 'form', 'security', 'layer', 'upload'], function () {
    var $ = layui.jquery,
        admin = layui.admin,
        table = layui.table,
        formgs = layui.formgs,
        form = layui.form,//控制添加修改（同一个弹出层）关闭弹出层的索引
        upload = layui.upload,
        layer = layui.layer, closeindex;
    var categoryList=null;

    table.render({
        elem: '#auth-table'
        , url: layui.setter.url + 'rotationPic/select'
        , title: '资源'
        , cols: [[
            {
                field: 'url', align:'center', title: '图片',
                templet: function (obj) {
                    if (obj.url != '' && obj.url != null) {
                            var t = "../../statics/upload/app/rotationPic/" + obj.url;
                        obj.url = '<img style="height:28px" onclick="tc(\'' + t + '\')" onload="DrawImage(this,100,28)"  src="' + t + '"/>';
                    }else{
                        obj.url='暂无图片';
                    }
                    return obj.url;
                }
            },
            {field: 'name', title: '图片名称', edit: 'text',},
            {field: 'sort', title: '排序', edit: 'text',},
            {field: 'isUsed', title: '启用状态', sort:false,
                templet: function(d){
                    if (d.isUsed == 0){
                        return "启用"
                    }else {
                        return "禁用"
                    }
                }
            },
            {fixed: 'right', title: '操作', toolbar: '#auth-state'}
        ]]
        , page: true
    });

    //普通图片上传
    var fileUpload="";
    var uploadInst_ = upload.render({
        elem: '#test-upload-normal'
        ,before: function(obj){
            //预读本地文件示例，不支持ie8
            obj.preview(function(index, file, result){
                fileUpload=file;
                $('#test-upload-normal-img').attr('src', result); //图片链接（base64）
            });
        }
    });





    var uploadInst = upload.render({
        elem: '#test-upload-type1'
        , ext: 'jpg|png|gif'
        , url: layui.setter.url + 'rotationPic/upload'
        , accept: "file"
        , size: 10240
        , before: function (obj) {
            this.data = {id: aid};
            obj.preview(function (index, file, result) {
                $('#test-upload-normal-img').attr('src', result); //图片链接（base64）
            });
        }
        , done: function (res) {
            res.code == 0 ? layer.msg('上传失败') : layer.msg('上传成功');
            table.reload("auth-table");
        }
        , error: function () {
            //演示失败状态，并实现重传
            var demoText = $('#test-upload-demoText');
            demoText.html('<span style="color: #FF5722;">上传失败</span> <a class="layui-btn layui-btn-mini demo-reload">重试</a>');
            demoText.find('.demo-reload').on('click', function () {
                uploadInst.upload();
            });
        }
    });
    table.on('tool(auth-table)', function (obj) {
        if (obj.event == 'upload') {
            aid = obj.data.id;
            $("#test-upload-type1").click();
        } else if (obj.event == 'updateUsed'){
            admin.req({
                url: layui.setter.url + "rotationPic/updateUsed/" + obj.data.id
            }).done(function (res) {
                table.reload('auth-table');
                layer.msg(res.msg);
            })
        } else if (obj.event == "remove") {
            layer.confirm('确定要删除【' + obj.data.name + '】这个资源吗？', function (index) {
                admin.req({
                    url: layui.setter.url + "rotationPic/remove/" + obj.data.id
                }).done(function (res) {
                    layer.close(index);
                    table.reload('auth-table');
                    layer.msg(res.msg);
                })
            });
        }
    })
    table.on('edit(auth-table)', function (obj) {
        var value = obj.value //得到修改后的值
            , data = obj.data //得到所在行所有键值
        console.log(data)
        let url = layui.setter.url + "rotationPic/update";
        admin.req({
            url: url,
            data: {id: data.id,name:data.name,sort:data.sort},
            done: function (res) {
                table.reload("auth-table");
                layer.msg(res.msg);
            }
        })
    });



    //查询
    var $ = layui.$, active = {
        reload: function () {
            var demoReload = $('#test-table-demoReload');
            //执行重载
            table.reload('auth-table', {
                page: {curr: 1}//重新从第 1 页开始
                , where: {name: demoReload.val()}
            });
        },
    };
    $("#resources-button-add").on("click", function () {
        layer.open({
            type: 1,
            area: ['20', '50%'],
            title: ("新增图片"),
            shadeClose: false,
            content: $("#layui-resources"),
            success: function (index, layero) {
                closeindex = layero;
                fileUpload="";
                formgs.reset('layui-resources');
                $("#total").val(0);
                $("#submit-form-resources-button").html($("#submit-form-add").html());
                $('#test-upload-normal-img').attr("src"," ");
                var html='';
                for(var c in categoryList){
                    html+='<option value="'+categoryList[c].id+'">'+categoryList[c].name+'</option>';
                }
                $("#category_id").html(html);
                form.render();
            },
        });
    })

    table.on('edit(category-auth-table)', function (obj) {
        var value = obj.value //得到修改后的值
            , data = obj.data //得到所在行所有键值
        let url = layui.setter.url + "category/update";
        admin.req({
            url: url,
            data: {id: data.id,name:data.name,sort: data.sort},
            done: function (res) {
                init();
                table.reload("category-auth-table");
                table.reload("auth-table");
                layer.msg(res.msg);
            }
        })
    });
    table.on('tool(category-auth-table)', function (obj) {
        if (obj.event == "remove") {
            layer.confirm('确定要删除【' + obj.data.name + '】这个类别吗？', function (index) {
                admin.req({
                    url: layui.setter.url + "category/remove/" + obj.data.id
                }).done(function (res) {
                    layer.close(index);
                    init();
                    table.reload('category-auth-table');
                    table.reload("auth-table");
                    layer.msg(res.msg);
                })
            });
        }
    })

    $("#category-button-add").on("click",function(){
        layer.open({
            type: 1,
            area: ['20', '40%'],
            title: ("资源类别"),
            shadeClose: false,
            content: $("#layui-category-add"),
            success: function (index, layero) {
                closeindex = layero;
                formgs.reset('layui-form-category');
                $("#submit-form-category-button").html($("#submit-form-category-add").html());
                form.render();
            },
        });
    })

    form.on('submit(submit-form-category)', function (data) {
        admin.req({
            url: layui.setter.url + "category/add",
            data: data.field,
            done: function (res) {
                layer.close(closeindex);
                init();
                table.reload("category-auth-table");
                table.reload("auth-table");
                layer.msg(res.msg);
            }
        })
        return false
    })

    //添加/修改提交
    form.on('submit(submit-form-resources)', function (data) {
        if (!fileUpload){
            layer.alert('上传图片不能为空！', {
                icon: 5,
                title: "提示"
            });
            return false;
        }
        var url = layui.setter.url + "rotationPic/add";
        var formdata = new FormData();
        formdata.append("name",data.field.name);
        formdata.append("sort",data.field.sort);
        formdata.append("file",fileUpload);
        admin.req({
            url: url,
            data: formdata,
            cache: false, //上传文件不需要缓存
            processData: false, // 告诉jQuery不要去处理发送的数据
            contentType: false, // 告诉jQuery不要去设置Content-Type请求头
            done: function (res) {
                layer.close(closeindex);
                table.reload("auth-table");
                layer.msg(res.msg);
            }
        })
        return false
    })

    $('.test-table-reload-btn .layui-btn').on('click', function () {
        var type = $(this).data('type');
        active[type] ? active[type].call(this) : '';
    });

});


function DrawImage(ImgD,width_s,height_s){
    var image=new Image();
    image.src=ImgD.src;
    if(image.width>0 && image.height>0){
        flag=true;
        if(image.width/image.height>=width_s/height_s){
            if(image.width>width_s){
                ImgD.width=width_s;
                ImgD.height=(image.height*width_s)/image.width;
            }else{
                ImgD.width=image.width;
                ImgD.height=image.height;
            }
        }
        else{
            if(image.height>height_s){
                ImgD.height=height_s;
                ImgD.width=(image.width*height_s)/image.height;
            }else{
                ImgD.width=image.width;
                ImgD.height=image.height;
            }
        }
    }
}
function tc(src){
    var html=''
    html+='<div id="tong" class="hide" style="width: 670px; height: 320px;display: table-cell;vertical-align: middle;  text-align: center; ">'
    html+='<img src="'+src+'" style="max-height: 500px;max-width: 1000px">'
    html+='</div>';
    layer.open({
        type: 1,
        title: false,
        closeBtn: 0,
        area: ['auto'],
        skin: 'layui-layer-nobg', //没有背景色
        shadeClose: true,
        content: html
    });
}
</script>
</body>
</html>

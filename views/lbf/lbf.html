<script type="text/html" id="timeTpl">
    <input type="text" id="startdate_{{d.id}}" value="{{d.startdate}}" readonly="readonly"
           class="layui-input layui-input-date" style="margin-top: -3px;text-align: center"/>
</script>
<script src="../../layuiadmin/layui/layui.js"></script>
<!--<script src="../../statics/js/jquery-3.2.1.min.js"></script>-->
<script>
    var arr = [];
    var price = '';
    var user = JSON.parse(window.localStorage.getItem("user"));
    console.log(user)
    /*$(document).ready(function() {
        $('textarea[name="text"]').on('input', function() {
            // 获取textarea的当前值
            var textareaValue = $(this).val();
            console.log(textareaValue)
        });
    })*/
    function getFormattedDate() {
        var date = new Date();
        var year = date.getFullYear();
        var month = ("0" + (date.getMonth() + 1)).slice(-2); // Months are zero based, thus add leading 0 and slice last 2 digits
        var day = ("0" + date.getDate()).slice(-2); // Add leading 0 and slice last 2 digits
        return year + "-" + month + "-" + day;
    }
    layui.config({
        base: '../../../layuiadmin/' //静态资源所在路径
    }).extend({
        index: 'lib/index', //主入口模块
    }).use(['index', 'table', 'formgs', 'form', 'security', 'layer', 'upload', 'laydate'], function () {
        var $ = layui.jquery,
            admin = layui.admin,
            table = layui.table,
            formgs = layui.formgs,
            form = layui.form,//控制添加修改（同一个弹出层）关闭弹出层的索引
            laydate = layui.laydate,
            upload = layui.upload,
            layer = layui.layer, closeindex;
        laydate.render({
            elem: '#startdate',
            type: 'datetime',
            format: 'yyyy-MM-dd HH:mm:ss',
            theme: 'grid',
            trigger: 'click',
            done: function(value, date, endDate){
                var $textarea = $('#layui-form-publish textarea[name="text"]');
                var content = $textarea.val();
                var newContent = content.replace(/(开区时间[:：])\s*[\d\- :]+/g, '$1 ' + value);
                $textarea.val(newContent);
            }
        });
        laydate.render({
            elem: '#startdate_update',
            type: 'datetime',
            format: 'yyyy-MM-dd HH:mm:ss',
            theme: 'grid',
            trigger: 'click',
            done: function(value, date, endDate){
                var $textarea = $('#layui-form-publish-update textarea[name="text"]');
                var content = $textarea.val();
                var newContent = content.replace(/(开区时间[:：])\s*[\d\- :]+/g, '$1 ' + value);
                $textarea.val(newContent);
            }
        });
        laydate.render({
            elem: '#enddate_update',
            type: 'datetime',
            format: 'yyyy-MM-dd HH:mm:ss',
            theme: 'grid',
            trigger: 'click',
            done: function(value, date, endDate){
                var $textarea = $('#layui-form-publish-update textarea[name="text"]');
                var content = $textarea.val();
                var newContent = content.replace(/(结束时间[:：])\s*[\d\- :]+/g, '$1 ' + value);
                $textarea.val(newContent);
            }
        });
        
        
        initType();
        initPrice();
        if(user.role_id !== 1){
            $('.hbsz').hide();
        }
        function initType(){
            admin.req({
                url: layui.setter.url + 'jax/publishType/selectAll',
                processData: false,
                traditonal: true,
                contentType: "application/json",
                done: function (res) {
                    arr = res.data;
                }
            })
        }

        function initPrice(){
            admin.req({
                url: layui.setter.url + 'webSite/selectOne/56',
                done: function (res) {
                    price = res.data.daytopprice;
                }
            })
        }
        table.render({
            elem: '#auth-table'
            , url: layui.setter.url + 'publish/select2'
            , title: '私服发布'
            , cols: [[
                {type: 'checkbox'}
                /*{
                    field: 'type', title: '类型', sort: true, width: 130,
                    templet: function (obj) {
                        var name = '';
                        for (var i = 0; i < arr.length; i++) {
                            if (obj.type == arr[i].id) {
                                name = arr[i].name;
                                break;
                            }
                        }
                        return name;
                    }
                }*/
                // , {field: 'price', title: '单价', sort: true, width: 130,}
                // , {field: 'money', title: '总价', sort: true, width: 130,}
                , {field: 'name', title: '服务器名',}
                // , {field: 'ipname', title: '私服IP', sort: true,}
                // , {field: 'line', title: '线路',}
                // , {field: 'versiondepict', title: '版本介绍', sort: true,}
                // , {field: 'kfqq', title: '客服QQ', sort: true,}
                , {field: 'url', title: '服务器地址', sort: false,}
                , {field: 'startdate', title: '开始时间', sort: false, width: 180,}
                , {field: 'enddate', title: '结束时间', sort: false, width: 180,}
                , {field: 'create_date', title: '发布时间', sort: false, width: 180,}
                , {field: 'mark', title: '备注', sort: false, width: 180,edit: 'text'}
                , {title: '状态', width: 180, sort: false, templet: function (data) {
                        if(data.state==0){
                            if(new Date(data.enddate)<new Date()){
                                return `<a style="color: red">已过期</a>`;
                            }else{
                                // 设定目标时间
                                const targetDate = new Date(data.enddate); // 注意：日期字符串需要是ISO格式或者能被Date正确解析的格式
                                // 获取当前时间
                                const now = new Date();
                                // 计算两个时间之间的差值（毫秒）
                                const difference = targetDate - now;
                                // 转换差值到天数、小时数和分钟数
                                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                                return `<a style="color: green">${days}天${hours}小时${minutes}分钟后结束</a>`;

        // 渲染月份数据表格
        function renderMonthDataTable(data, month) {
            // 准备表格数据
            var tableData = [];
            var totals = {
                moneyTotal: 0,
                cancelMoneyTotal: 0,
                innerCount: 0,
                cancelCount: 0,
                subMoneyTotal: 0,
                payCount: 0,
                givedCount: 0,
                allCount: 0,
                outerCount: 0
            };
            
            // 只遍历有数据的日期
            for (var dayStr in data) {
                var dayData = data[dayStr];
                
                // 只添加有数据的行（allCount 或 payCount 大于 0）
                if (dayData.allCount > 0 || dayData.payCount > 0 || dayData.moneyTotal > 0) {
                    var row = {
                        day: parseInt(dayStr) + '号',
                        moneyTotal: dayData.moneyTotal || 0,
                        cancelMoneyTotal: dayData.cancelMoneyTotal || 0,
                        subMoneyTotal: dayData.subMoneyTotal || 0,
                        payCount: dayData.payCount || 0,
                        givedCount: dayData.givedCount || 0,
                        innerCount: dayData.innerCount || 0,
                        outerCount: dayData.outerCount || 0,
                        cancelCount: dayData.cancelCount || 0
                    };
                    tableData.push(row);
                    
                    // 累加合计
                    for (var key in totals) {
                        totals[key] += (dayData[key] || 0);
                    }
                }
            }
            
            // 按日期排序
            tableData.sort(function(a, b) {
                return parseInt(a.day) - parseInt(b.day);
            });
            
            // 添加合计行
            tableData.push({
                day: '合计',
                moneyTotal: totals.moneyTotal,
                cancelMoneyTotal: totals.cancelMoneyTotal,
                subMoneyTotal: totals.subMoneyTotal,
                payCount: totals.payCount,
                givedCount: totals.givedCount,
                innerCount: totals.innerCount,
                outerCount: totals.outerCount,
                cancelCount: totals.cancelCount,
                isTotal: true
            });
            
            // 渲染表格
            table.render({
                elem: '#month-data-table',
                data: tableData,
                page: false,
                cellMinWidth: 80,
                cols: [[
                    {field: 'day', title: '日期', width: 80},
                    {field: 'moneyTotal', title: '发广告总金额', width: 130, templet: function(d) {
                        return d.isTotal ? d.moneyTotal.toFixed(1) : (d.moneyTotal ? d.moneyTotal.toFixed(1) : '0.0');
                    }},
                    {field: 'cancelMoneyTotal', title: '撤销广告总额', width: 130, templet: function(d) {
                        return d.isTotal ? d.cancelMoneyTotal.toFixed(1) : (d.cancelMoneyTotal ? d.cancelMoneyTotal.toFixed(1) : '0.0');
                    }},
                    {field: 'subMoneyTotal', title: '发广告净金额', width: 130, templet: function(d) {
                        return d.isTotal ? d.subMoneyTotal.toFixed(1) : (d.subMoneyTotal ? d.subMoneyTotal.toFixed(1) : '0.0');
                    }},
                    {field: 'allCount', title: '广告总条数', width: 100, templet: function(d) {
                        return parseInt(d.payCount) + parseInt(d.givedCount);
                    }},
                    {field: 'payCount', title: '收费广告条数', width: 130},
                    {field: 'givedCount', title: '赠送条数', width: 130},
                    {field: 'innerCount', title: '内服条数', width: 90},
                    {field: 'outerCount', title: '非内服条数', width: 110},
                    {field: 'cancelCount', title: '撤销条数', width: 90}
                ]],
                done: function(res, curr, count) {
                    // 设置合计行背景色和样式
                    $('.layui-table-body tr:last').css('background-color', '#f2f2f2').css('font-weight', 'bold');
                }
            });
        }

        function normalizeFieldLabel(label) {
            var text = (label || '')
                .replace(/\s+/g, '')
                .replace(/：/g, ':')
                .toLowerCase();

            if (text.indexOf('服务器') > -1 && text.indexOf('名') > -1) {
                return 'name';
            }
            if (text.indexOf('服务器') > -1 && (text.indexOf('ip') > -1 || text.indexOf('IP') > -1)) {
                return 'ipname';
            }
            if (text.indexOf('线路') > -1) {
                return 'line';
            }
            if (text.indexOf('版本') > -1) {
                return 'versiondepict';
            }
            if (text.indexOf('客服') > -1 && (text.indexOf('qq') > -1 || text.indexOf('QQ') > -1)) {
                return 'kfqq';
            }
            if (text.indexOf('主页') > -1 || text.indexOf('地址') > -1 || text.indexOf('网址') > -1 || text === 'url') {
                return 'url';
            }
            if (text.indexOf('开区') > -1 && text.indexOf('时间') > -1) {
                return 'datetime';
            }
            if ((text.indexOf('开抢') > -1 || text.indexOf('开枪') > -1) && text.indexOf('时间') > -1) {
                return 'granttime';
            }

            // 投放站点
            if (text.indexOf('投放') > -1 && text.indexOf('站点') > -1) {
                return 'launch';
            }

            // 商户ID, 分组ID, APIKEY, 客户QQ
            if (text.indexOf('商户') > -1 && (text.indexOf('id') > -1 || text.indexOf('id') > -1)) {
                return 'merchantId';
            }
            if (text.indexOf('分组') > -1 && (text.indexOf('id') > -1 || text.indexOf('id') > -1)) {
                return 'groupId';
            }
            if (text.indexOf('apikey') > -1 || text.indexOf('apikey') > -1 || text.indexOf('api') > -1) {
                return 'apiKey';
            }
            if (text.indexOf('客服') > -1 && (text.indexOf('qq') > -1 || text.indexOf('QQ') > -1)) {
                return 'customerQq';
            }

            // 商户ID, 分组ID, APIKEY, 客户QQ
            if (text.indexOf('商户') > -1 && (text.indexOf('id') > -1 || text.indexOf('id') > -1)) {
                return 'merchantId';
            }
            if (text.indexOf('分组') > -1 && (text.indexOf('id') > -1 || text.indexOf('id') > -1)) {
                return 'groupId';
            }
            if (text.indexOf('apikey') > -1 || text.indexOf('apikey') > -1 || text.indexOf('api') > -1) {
                return 'apiKey';
            }
            if (text.indexOf('客户') > -1 && (text.indexOf('qq') > -1 || text.indexOf('QQ') > -1)) {
                return 'customerQq';
            }

            return '';
        }

                }

        function parsePublishText(text) {
            var lines = (text || '').split(/\r?\n/);
            var records = [];
            var current = null;

            for (var i = 0; i < lines.length; i++) {
                var line = (lines[i] || '').trim();

                if (!line || isSeparatorLine(line)) {
                    continue;
                }

                var normalizedLine = line.replace(/：/g, ':');
                var colonIndex = normalizedLine.indexOf(':');
                if (colonIndex === -1) {
                    continue;
                }

                var label = normalizedLine.substring(0, colonIndex).trim();
                var value = normalizedLine.substring(colonIndex + 1).trim();
                var key = normalizeFieldLabel(label);

                if (!key) {
                    continue;
                }

                value = normalizeFieldValue(key, value);
                if (!value) {
                    continue;
                }

                if (key === 'name') {
                    if (current && hasRecordContent(current)) {
                        records.push(current);
                    }
                    current = {};
                }

                if (!current) {
                    current = {};
                }

                current[key] = value;
            }

            if (current && hasRecordContent(current)) {
                records.push(current);
            }

            return records;
        }
        function hasRecordContent(record) {
            if (!record) {
                return false;
            }

            return !!(
                record.name ||
                record.ipname ||
                record.line ||
                record.versiondepict ||
                record.kfqq ||
                record.url ||
                record.datetime ||
                record.granttime ||
                record.launch ||
                record.merchantId ||
                record.groupId ||
                record.apiKey ||
                record.customerQq
            );
        }
        function isSeparatorLine(line) {
        var text = (line || '').replace(/\s+/g, '');
        return /^[\-=]{3,}$/.test(text);
    }

    function normalizeFieldValue(key, value) {
        var text = (value || '').trim();

        if (key === 'url') {
            text = text.replace(/\/+$/, '');
        }

        if (key === 'datetime') {
            var match = text.match(/(\d{4})-(\d{1,2})-(\d{1,2})(?:\s+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?/);

            if (match) {
                var year = match[1];
                var month = ('0' + match[2]).slice(-2);
                var day = ('0' + match[3]).slice(-2);
                var hours = match[4] != null ? ('0' + match[4]).slice(-2) : '00';
                var minutes = match[5] != null ? ('0' + match[5]).slice(-2) : '00';
                var seconds = match[6] != null ? ('0' + match[6]).slice(-2) : '00';

                text = year + '-' + month + '-' + day + ' ' + hours + ':' + minutes + ':' + seconds;
            }
        }

        return text;
    }

<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>静态化</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="../../layuiadmin/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../../layuiadmin/style/admin.css" media="all">


</head>
<body>
<style>
    .layadmin-homepage-pad-ver {
        padding-top: 15px;
        padding-bottom: 15px;
    }

    .layadmin-homepage-pad-img {
        box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.1);
        border-radius: 50%;
    }
</style>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">静态化</div>
                <div class="layui-card-body">
                    <div class="test-table-reload-btn" style="margin-bottom: 10px;">
<!--                        <div class="layui-inline">-->
<!--                            <div class="layui-input-inline">-->
<!--                                <input type="text" name="start_time" class="layui-input" id="start_time"-->
<!--                                       placeholder="开始时间(修改时间)">-->
<!--                            </div>-->
<!--                        </div>-->
<!--                        <br><br>-->
                            <button id="all" shiro-event="jax:web:all" lay-submit lay-filter="submit-form-all"
                                    class="layui-btn" data-type="reload">更新所有网站
                            </button>
                            <button id="index" shiro-event="jax:web:index" lay-submit lay-filter="submit-form-index" class="layui-btn"><i
                                    class="layui-icon">&#xe654;</i>广告查询
                            </button>

                            <button id="publishSites" shiro-event="jax:web:publishSites" lay-submit lay-filter="submit-form-publishSites" class="layui-btn"><i
                                    class="layui-icon">&#xe654;</i>发布站点
                            </button>
                            <button id="recruTran" shiro-event="jax:web:recruTran" lay-submit lay-filter="submit-form-recruTran" class="layui-btn"><i
                                    class="layui-icon">&#xe654;</i>招聘交易
                            </button>
                            <button id="forumFunction" shiro-event="jax:web:forumFunction" lay-submit lay-filter="submit-form-forumFunction" class="layui-btn"><i
                                    class="layui-icon">&#xe654;</i>传奇论坛
                            </button>
                            <button id="resourceNavigation" shiro-event="jax:web:resourceNavigation" lay-submit lay-filter="submit-form-resourceNavigation" class="layui-btn"><i
                                    class="layui-icon">&#xe654;</i>资源导航
                            </button>
                            <button id="brand" shiro-event="jax:web:brand" lay-submit lay-filter="submit-form-brand" class="layui-btn"><i
                                    class="layui-icon">&#xe654;</i>严选好服
                            </button>
                            <button id="articleList" shiro-event="jax:web:articleList" lay-submit lay-filter="submit-form-articleList" class="layui-btn"><i
                                    class="layui-icon">&#xe654;</i>文章列表
                            </button>
                            <button id="offsite" shiro-event="jax:web:offsite" lay-submit lay-filter="submit-form-articleList" class="layui-btn"><i
                                    class="layui-icon">&#xe654;</i>网站举报
                            </button>
                            <button id="news" shiro-event="jax:web:news" lay-submit lay-filter="submit-form-news" class="layui-btn"><i
                                    class="layui-icon">&#xe654;</i>新闻公告
                            </button>
                            <button id="phoneRank" shiro-event="jax:web:phoneRank" lay-submit lay-filter="submit-form-phoneRank" class="layui-btn"><i
                                    class="layui-icon">&#xe654;</i>手游排行
                            </button>
                            <button id="playerGroup" shiro-event="jax:web:playerGroup" lay-submit lay-filter="submit-form-playerGroup" class="layui-btn"><i
                                    class="layui-icon">&#xe654;</i>玩家群主播
                            </button>
                            <button id="allAdvertisements" shiro-event="jax:web:allAdvertisements" lay-submit lay-filter="submit-form-allAdvertisements" class="layui-btn"><i
                                    class="layui-icon">&#xe654;</i>全网广告
                            </button>

                    </div>

                    <div class="layui-form-item">
                        <label class="layui-form-label">网站栏目</label>
                        <div class="layui-input-block">
                            <textarea name="column" id="column" placeholder="请输入栏目数据" class="layui-textarea"></textarea>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">友情链接</label>
                        <div class="layui-input-block">
                            <textarea name="friendurl" id="friendurl" placeholder="友情链接"
                                      class="layui-textarea"></textarea>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">网站底部</label>
                        <div class="layui-input-block">
                            <textarea name="bottom" id="bottom" placeholder="请输入底部数据" class="layui-textarea"></textarea>
                        </div>
                    </div>

                    <button id="config" class="layui-btn"  shiro-event="jax:web:config" lay-submit lay-filter="submit-form-config" class="layui-btn">
                        更新网站数据
                    </button>
                    <table class="layui-hide" id="auth-table" lay-filter="auth-table"></table>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="../../layuiadmin/layui/layui.js"></script>
<script>
    layui.config({
        base: '../../../layuiadmin/' //静态资源所在路径
    }).extend({
        index: 'lib/index', //主入口模块
    }).use(['index', 'layer','form'], function () {
        var $ = layui.jquery,
            admin = layui.admin,
            form = layui.form,
            layer = layui.layer;
        //执行一个laydate实例
        // laydate.render({
        //     elem: '#start_time' //指定元素
        // });


        $.ajax({
            url: "/statics/column_data.txt",
            type: 'GET',
            sync: true,
            datatype: "text",
            cache: false,
            success: function (data) {
                document.getElementById("column").value = data;
            }
        })

        $.ajax({
            url: "/statics/friendurl_data.txt",
            type: 'GET',
            sync: true,
            datatype: "text",
            cache: false,
            success: function (data) {
                document.getElementById("friendurl").value = data;
            }
        })

        $.ajax({
            url: "/statics/bottom_data.txt",
            type: 'GET',
            sync: true,
            datatype: "text",
            cache: false,
            success: function (data) {
                document.getElementById("bottom").value = data;
            }
        })


        $("#all").on("click", function () {
            var url = layui.setter.url + "/html/all"

            var index = layer.msg('处理中', {
                icon: 16
                , shade: 0.01
                , time: false
            });

            admin.req({
                url: url,
                done: function (res) {
                    layer.close(index);
                    layer.msg(res.msg);
                }
            })
        })

        $("#index").on("click", function () {
            var url = layui.setter.url + "/html/index"

            var index = layer.msg('处理中', {
                icon: 16
                , shade: 0.01
                , time: false
            });

            admin.req({
                url: url,
                done: function (res) {
                    layer.close(index);
                    layer.msg(res.msg);
                }
            })
        })
        $("#publishSites").on("click", function () {
            var url = layui.setter.url + "/html/publishSites"

            var index = layer.msg('处理中', {
                icon: 16
                , shade: 0.01
                , time: false
            });

            admin.req({
                url: url,
                done: function (res) {
                    layer.close(index);
                    layer.msg(res.msg);
                }
            })
        })

        $("#recruTran").on("click", function () {
            var url = layui.setter.url + "/html/recruTran"

            var index = layer.msg('处理中', {
                icon: 16
                , shade: 0.01
                , time: false
            });

            admin.req({
                url: url,
                done: function (res) {
                    layer.close(index);
                    layer.msg(res.msg);
                }
            })
        })

        $("#forumFunction").on("click", function () {
            var url = layui.setter.url + "/html/forumFunction"

            var index = layer.msg('处理中', {
                icon: 16
                , shade: 0.01
                , time: false
            });

            admin.req({
                url: url,
                done: function (res) {
                    layer.close(index);
                    layer.msg(res.msg);
                }
            })
        })

        $("#resourceNavigation").on("click", function () {
            var url = layui.setter.url + "/html/resourceNavigation"

            var index = layer.msg('处理中', {
                icon: 16
                , shade: 0.01
                , time: false
            });

            admin.req({
                url: url,
                done: function (res) {
                    layer.close(index);
                    layer.msg(res.msg);
                }
            })
        })

        $("#articleList").on("click", function () {
           // var time = document.getElementById("start_time").value;
            var url = layui.setter.url + "/html/articleList";//?time=" + time

            var index = layer.msg('处理中', {
                icon: 16
                , shade: 0.01
                , time: false
            });

            admin.req({
                url: url,
                done: function (res) {
                    layer.close(index);
                    layer.msg(res.msg);
                }
            })
        })

        $("#updatePage").on("click", function () {
            var url = layui.setter.url + "/html/updatePage";
            var index = layer.msg('处理中', {
                icon: 16
                , shade: 0.01
                , time: false
            });
            admin.req({
                url: url,
                done: function (res) {
                    layer.close(index);
                    layer.msg(res.msg);
                }
            })
        })

        $("#brand").on("click", function () {
            var url = layui.setter.url + "/html/brand"
            var index = layer.msg('处理中', {
                icon: 16
                , shade: 0.01
                , time: false
            });

            admin.req({
                url: url,
                done: function (res) {
                    layer.close(index);
                    layer.msg(res.msg);
                }
            })
        })



        $("#offsite").on("click", function () {
            var url = layui.setter.url + "/html/offsite"
            var index = layer.msg('处理中', {
                icon: 16
                , shade: 0.01
                , time: false
            });

            admin.req({
                url: url,
                done: function (res) {
                    layer.close(index);
                    layer.msg(res.msg);
                }
            })
        })

        $("#news").on("click", function () {
            var url = layui.setter.url + "/html/news"

            var index = layer.msg('处理中', {
                icon: 16
                , shade: 0.01
                , time: false
            });
            admin.req({
                url: url,
                done: function (res) {
                    layer.close(index);
                    layer.msg(res.msg);
                }
            })
        })

        // 手游排行
        $("#phoneRank").on("click", function () {
            var url = layui.setter.url + "/html/phoneRank"

            var index = layer.msg('处理中', {
                icon: 16
                , shade: 0.01
                , time: false
            });
            admin.req({
                url: url,
                done: function (res) {
                    layer.close(index);
                    layer.msg(res.msg);
                }
            })
        })

        // 玩家群主播
        $("#playerGroup").on("click", function () {
            var url = layui.setter.url + "/html/playerGroup"

            var index = layer.msg('处理中', {

            });

                url: url,
                done: function (res) {
                    layer.close(index);
                    layer.msg(res.msg);
                }
            })
        })

        // 全网广告
        $("#allAdvertisements").on("click", function () {
            var url = layui.setter.url + "/html/allAdvertisements"

            var index = layer.msg('处理中', {
                icon: 16
                , shade: 0.01
                , time: false
            });
            admin.req({
                url: url,
                done: function (res) {
                    layer.close(index);
                    layer.msg(res.msg);
                }
            })
        })

        $("#config").on("click", function () {
            var column = document.getElementById("column").value;
            var friendurl = document.getElementById("friendurl").value;
            var bottom = document.getElementById("bottom").value;
            var url = layui.setter.url + "/html/config";

            var index = layer.msg('处理中', {
                icon: 16
                , shade: 0.01
                , time: false
            });
            admin.req({
                url: url,
                data: {column: column, friendurl: friendurl, bottom: bottom},
                done: function (res) {
                    layer.close(index);
                    layer.msg(res.msg);
                    setTimeout("document.location.reload();", 3000);
                }
            })
            layer.close(index);
            return false;
        })
    });
</script>
</body>
</html>

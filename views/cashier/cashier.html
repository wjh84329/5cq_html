<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Cashier订单查询</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="../../layuiadmin/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../../layuiadmin/style/admin.css" media="all">
</head>
<body>
<style>
    .cashier-stat-section {
        margin-bottom: 14px;
    }

    .cashier-stat-section-title {
        font-size: 15px;
        font-weight: 700;
        color: #333;
        margin: 0 0 12px 2px;
    }

    .cashier-stat-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 14px;
    }

    .cashier-stat-card {
        position: relative;
        overflow: hidden;
        min-height: 132px;
        border-radius: 14px;
        padding: 18px 20px 16px;
        color: #fff;
        box-shadow: 0 10px 24px rgba(31, 35, 41, 0.12);
    }

    .cashier-stat-card:before {
        content: '';
        position: absolute;
        right: -24px;
        top: -24px;
        width: 88px;
        height: 88px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.14);
    }

    .cashier-stat-card.orders { background: linear-gradient(135deg, #1f6feb 0%, #4f8cff 100%); }
    .cashier-stat-card.discount { background: linear-gradient(135deg, #8a3ffc 0%, #b15eff 100%); }
    .cashier-stat-card.order-amount { background: linear-gradient(135deg, #d9485f 0%, #ff7a7a 100%); }
    .cashier-stat-card.actual-pay { background: linear-gradient(135deg, #0f9d58 0%, #38c172 100%); }
    .cashier-stat-card.risk { background: linear-gradient(135deg, #b26a00 0%, #f0a020 100%); }

    .cashier-stat-label {
        position: relative;
        z-index: 1;
        font-size: 13px;
        opacity: 0.92;
        margin-bottom: 16px;
    }

    .cashier-stat-compare {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
    }

    .cashier-stat-side {
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.10);
        backdrop-filter: blur(2px);
    }

    .cashier-stat-side-title {
        font-size: 12px;
        opacity: 0.82;
        margin-bottom: 8px;
    }

    .cashier-stat-value {
        font-size: 28px;
        line-height: 1.2;
        font-weight: 700;
    }

    .cashier-stat-unit {
        font-size: 14px;
        margin-left: 4px;
        opacity: 0.9;
    }

    .cashier-stat-date {
        margin-top: 10px;
        font-size: 12px;
        opacity: 0.82;
    }

    .cashier-search-bar {
        margin-bottom: 10px;
        padding: 16px 0 6px;
    }

    @media screen and (max-width: 1366px) {
        .cashier-stat-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
    }

    @media screen and (max-width: 768px) {
        .cashier-stat-grid,
        .cashier-stat-compare {
            grid-template-columns: 1fr;
        }
    }
</style>

<script src="../../layuiadmin/layui/layui.js"></script>
<script>
    layui.config({
        base: '../../../layuiadmin/'
    }).extend({
        index: 'lib/index'
    }).use(['index', 'table', 'form', 'laydate', 'layer'], function () {
        var $ = layui.jquery,
            admin = layui.admin,
            table = layui.table,
            form = layui.form,
            laydate = layui.laydate,
            layer = layui.layer,
            cashierTableInstance = null,
            cashierRechargeLayerIndex = null;

        function toNumber(value) {
            var num = parseFloat(value);
            return isNaN(num) ? 0 : num;
        }

        function isAdminLoginName(value) {
            return $.trim(String(value == null ? '' : value)).toLowerCase() === 'admin';
        }

        function safeParseStorageJson(key) {
            var raw = window.localStorage.getItem(key);
            if (!raw) {
                return null;
            }
            try {
                return JSON.parse(raw);
            } catch (e) {
                return null;
            }
        }

        function extractLoginName(userData) {
            if (!userData || typeof userData !== 'object') {
                return '';
            }
            return $.trim(String(
                userData.login_name
                || userData.loginName
                || userData.username
                || userData.userName
                || ''
            ));
        }

        function setSubsidyConfigVisible(visible) {
            $('#gear-config-btn').toggle(!!visible);
        }

        function getStoredLoginName() {
            var user = safeParseStorageJson('user');
            var loginName = extractLoginName(user);
            if (loginName) {
                return loginName;
            }

            var userInfo = safeParseStorageJson('userinfo');
            return extractLoginName(userInfo);
        }

        function loadSubsidyConfigPermission() {
            if (isAdminLoginName(getStoredLoginName())) {
                setSubsidyConfigVisible(true);
                return;
            }

            if (!admin || typeof admin.req !== 'function') {
                setSubsidyConfigVisible(false);
                return;
            }

            admin.req({
                url: layui.setter.url + 'authc/getUserInfo',
                type: 'get',
                done: function (res) {
                    var userData = res && res.data ? res.data : {};
                    if (res && res.code === 0 && isAdminLoginName(extractLoginName(userData))) {
                        setSubsidyConfigVisible(true);
                        return;
                    }
                    setSubsidyConfigVisible(false);
                },
                error: function () {
                    setSubsidyConfigVisible(false);
                }
            });
        }

        function formatMoney(value) {
            return toNumber(value).toFixed(2);
        }

        function getConfigField(data, camelKey, snakeKey, defaultValue) {
            if (!data || typeof data !== 'object') {
                return defaultValue;
            }
            if (typeof data[camelKey] !== 'undefined' && data[camelKey] !== null && data[camelKey] !== '') {
                return data[camelKey];
            }
            if (typeof data[snakeKey] !== 'undefined' && data[snakeKey] !== null && data[snakeKey] !== '') {
                return data[snakeKey];
            }
            return defaultValue;
        }

        function escapeHtmlAttr(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function normalizeRuleValue(value) {
            var text = $.trim(value == null ? '' : String(value)).replace(/元/g, '');
            if (/^\d+(\.\d+)?$/.test(text)) {
                return String(parseInt(text, 10));
            }
            return text;
        }

        function normalizeAmountRangeText(value) {
            var text = $.trim(value == null ? '' : String(value)).replace(/元/g, '').replace(/\s+/g, '');
            if (!text) {
                return '';
            }

            var parts = text.split('-');
            if (parts.length === 1) {
                if (!/^\d+(\.\d+)?$/.test(parts[0])) {
                    return text;
                }
                return String(parseFloat(parts[0]));
            }

            if (parts.length === 2 && /^\d+(\.\d+)?$/.test(parts[0]) && /^\d+(\.\d+)?$/.test(parts[1])) {
                return String(parseFloat(parts[0])) + '-' + String(parseFloat(parts[1]));
            }

            return text;
        }

        function parseAmountRangeValue(value) {
            var text = normalizeAmountRangeText(value);
            if (!text) {
                return null;
            }

            var parts = text.split('-');
            if (parts.length === 1) {
                var amount = parseFloat(parts[0]);
                if (isNaN(amount) || amount < 0) {
                    return null;
                }
                return {
                    text: String(amount),
                    min: amount,
                    max: amount
                };
            }

            if (parts.length === 2) {
                var min = parseFloat(parts[0]);
                var max = parseFloat(parts[1]);
                if (isNaN(min) || isNaN(max) || min < 0 || max < 0 || max < min) {
                    return null;
                }
                return {
                    text: String(min) + '-' + String(max),
                    min: min,
                    max: max
                };
            }

            return null;
        }

        function buildRuleData(rule) {
            rule = rule || {};
            return {
                rechargeMin: normalizeRuleValue(getConfigField(rule, 'rechargeMin', 'recharge_min', '')),
                rechargeMax: normalizeRuleValue(getConfigField(rule, 'rechargeMax', 'recharge_max', '')),
                discountMin: normalizeRuleValue(getConfigField(rule, 'discountMin', 'discount_min', '')),
                discountMax: normalizeRuleValue(getConfigField(rule, 'discountMax', 'discount_max', ''))
            };
        }

        function parseLegacyRangeText(rangeText) {
            var text = normalizeRuleValue(rangeText);
            if (!text) {
                return null;
            }
            var parts = text.split('-');
            if (parts.length === 1) {
                return {
                    min: parts[0],
                    max: parts[0]
                };
            }
            return {
                min: $.trim(parts[0] || ''),
                max: $.trim(parts[1] || '')
            };
        }

        function buildLegacyRuleList(configData) {
            var rules = [];
            var smallRange = parseLegacyRangeText(getConfigField(configData, 'min', 'min', '3-5'));
            var largeRange = parseLegacyRangeText(getConfigField(configData, 'max', 'max', '6-10'));

            if (smallRange) {
                rules.push({
                    rechargeMin: '20',
                    rechargeMax: '99',
                    discountMin: smallRange.min,
                    discountMax: smallRange.max
                });
            }
            if (largeRange) {
                rules.push({
                    rechargeMin: '100',
                    rechargeMax: '499',
                    discountMin: largeRange.min,
                    discountMax: largeRange.max
                });
            }
            rules.push({
                rechargeMin: '500',
                rechargeMax: '',
                discountMin: '20',
                discountMax: '20'
            });
            return rules;
        }

        function getSubsidyRuleList(configData) {
            var rawRules = configData && $.isArray(configData.rules) ? configData.rules : [];
            var rules = [];

            $.each(rawRules, function (_, item) {
                var rule = buildRuleData(item);
                if (!rule.rechargeMin && !rule.rechargeMax && !rule.discountMin && !rule.discountMax) {
                    return;
                }
                rules.push(rule);
            });

            if (!rules.length) {
                rules = buildLegacyRuleList(configData || {});
            }

            if (!rules.length) {
                rules.push(buildRuleData());
            }
            return rules;
        }

        function renderSubsidyRuleRows(rules) {
            var list = $.isArray(rules) ? rules : [];
            if (!list.length) {
                list = [buildRuleData()];
            }

            var html = '';
            $.each(list, function (index, item) {
                var rule = buildRuleData(item);
                html += '' +
                    '<div class="subsidy-rule-row" style="margin-bottom: 10px; padding: 12px; border: 1px solid #e6e6e6; border-radius: 6px; background: #fafafa;">' +
                        '<div style="font-size: 13px; color: #666; margin-bottom: 10px;">规则 ' + (index + 1) + '</div>' +
                        '<div>' +

        function parseRuleNumber(value) {
            var text = normalizeRuleValue(value);
            if (!text || !/^\d+$/.test(text)) {
                return null;
            }
            var num = parseInt(text, 10);
            return isNaN(num) ? null : num;
        }

        function getSubsidyRuleDrafts() {
            var drafts = [];
            $('#subsidy-rule-list').find('.subsidy-rule-row').each(function () {
                drafts.push({
                    rechargeMin: $(this).find('.subsidy-recharge-min').val(),
                    rechargeMax: $(this).find('.subsidy-recharge-max').val(),
                    discountMin: $(this).find('.subsidy-discount-min').val(),
                    discountMax: $(this).find('.subsidy-discount-max').val()
                });
            });
            return drafts;
        }

        function collectSubsidyRules() {
            var rows = $('#subsidy-rule-list').find('.subsidy-rule-row');
            var rules = [];
            var invalidMessage = '';

            rows.each(function (index) {
                if (invalidMessage) {
                    return false;
                }

                var rechargeMinText = normalizeRuleValue($(this).find('.subsidy-recharge-min').val());
                var rechargeMaxText = normalizeRuleValue($(this).find('.subsidy-recharge-max').val());
                var discountMinText = normalizeRuleValue($(this).find('.subsidy-discount-min').val());
                var discountMaxText = normalizeRuleValue($(this).find('.subsidy-discount-max').val());

                if (!rechargeMinText && !rechargeMaxText && !discountMinText && !discountMaxText) {
                    return;
                }

                if (!rechargeMinText || !discountMinText || !discountMaxText) {
                    invalidMessage = '请完整填写规则 ' + (index + 1) + ' 的金额区间';
                    return false;
                }

                var rechargeMin = parseRuleNumber(rechargeMinText);
                var rechargeMax = rechargeMaxText === '' ? null : parseRuleNumber(rechargeMaxText);
                var discountMin = parseRuleNumber(discountMinText);
                var discountMax = parseRuleNumber(discountMaxText);

                if (rechargeMin === null || discountMin === null || discountMax === null || (rechargeMaxText !== '' && rechargeMax === null)) {
                    invalidMessage = '规则 ' + (index + 1) + ' 存在无效金额';
                    return false;
                }
                if (rechargeMin < 0 || (rechargeMax !== null && rechargeMax < 0) || discountMin < 0 || discountMax < 0) {
                    invalidMessage = '规则 ' + (index + 1) + ' 金额不能小于 0';
                    return false;
                }
                if (rechargeMax !== null && rechargeMax < rechargeMin) {
                    invalidMessage = '规则 ' + (index + 1) + ' 的充值最大值不能小于最小值';
                    return false;
                }
                if (discountMax < discountMin) {
                    invalidMessage = '规则 ' + (index + 1) + ' 的补贴最大值不能小于最小值';
                    return false;
                }

                rules.push({
                    rechargeMin: rechargeMinText,
                    rechargeMax: rechargeMaxText,
                    discountMin: discountMinText,
                    discountMax: discountMaxText
                });
            });

            if (invalidMessage) {
                layer.msg(invalidMessage);
                return null;
            }
            if (!rules.length) {
                layer.msg('请至少配置一条补贴规则');
                return null;
            }

            rules.sort(function (a, b) {
                return parseFloat(a.rechargeMin) - parseFloat(b.rechargeMin);
            });

            for (var i = 0; i < rules.length; i++) {
                var currentMin = parseFloat(rules[i].rechargeMin);
                var currentMax = rules[i].rechargeMax === '' ? null : parseFloat(rules[i].rechargeMax);
                if (i > 0) {
                    var previousMax = rules[i - 1].rechargeMax === '' ? null : parseFloat(rules[i - 1].rechargeMax);
                    if (previousMax === null) {
                        layer.msg('充值最大值留空的规则只能放在最后一条');
                        return null;
                    }
                    if (currentMin <= previousMax) {
                        layer.msg('充值区间不能重叠，请检查规则 ' + i + ' 和规则 ' + (i + 1));
                        return null;
                    }
                }
                if (currentMax === null && i !== rules.length - 1) {
                    layer.msg('充值最大值留空的规则只能放在最后一条');
                    return null;
                }
            }

            return rules;
        }

        function padTimePart(value) {
            var timeValue = parseInt(value, 10);
            if (isNaN(timeValue) || timeValue < 0) {
                timeValue = 0;
            }
            return ('0' + timeValue).slice(-2);
        }

        function normalizeTimeText(value, defaultValue) {
            var text = $.trim(value || '');
            if (!text) {
                return defaultValue;
            }
            var match = text.match(/^(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?$/);
            if (!match) {
                return defaultValue;
            }
            var hour = parseInt(match[1], 10);
            var minute = parseInt(match[2], 10);
            var second = typeof match[3] === 'undefined' ? 0 : parseInt(match[3], 10);
            if (isNaN(hour) || isNaN(minute) || isNaN(second) || hour < 0 || hour > 23 || minute < 0 || minute > 59 || second < 0 || second > 59) {
                return defaultValue;
            }
            return padTimePart(hour) + ':' + padTimePart(minute) + ':' + padTimePart(second);
        }

        function buildConfigTimeText(data, timeCamelKey, timeSnakeKey, hourCamelKey, hourSnakeKey, minuteCamelKey, minuteSnakeKey, defaultValue) {
            var directTime = normalizeTimeText(getConfigField(data, timeCamelKey, timeSnakeKey, ''), '');
            if (directTime) {
                return directTime;
            }
            var hour = getConfigField(data, hourCamelKey, hourSnakeKey, '');
            var minute = getConfigField(data, minuteCamelKey, minuteSnakeKey, '');
            var second = getConfigField(data, 'startSecond', 'start_second', '');
            if (timeCamelKey === 'endTime' || timeSnakeKey === 'end_time') {
                second = getConfigField(data, 'endSecond', 'end_second', '');
            }
            if (hour === '' && minute === '' && second === '') {
                return defaultValue;
            }
            return padTimePart(hour) + ':' + padTimePart(minute) + ':' + padTimePart(second === '' ? 0 : second);
        }

        function parseTimeRangeValue(timeText) {
            var normalizedText = normalizeTimeText(timeText, '');
            if (!normalizedText) {
                return null;
            }
            var parts = normalizedText.split(':');
            var hour = parseInt(parts[0], 10);
            var minute = parseInt(parts[1], 10);
            var second = parseInt(parts[2], 10);
            return {
                text: normalizedText,
                hour: hour,
                minute: minute,
                second: second,
                totalSeconds: hour * 3600 + minute * 60 + second
            };
        }

        function bindGearTimeInput(selector) {

        }

                return false;
            }
            if (!$.trim(fields.rechargeOrderNoValue || '')) {
                layer.msg('请输入充值订单号');
                return false;
            }

            $.ajax({
                url: layui.setter.url + 'cashier/saveRechargeRecord',
                type: 'POST',
                dataType: 'json',
                data: {
                    cashier_order_id: fields.rechargeRecordId || '',
                    order_number: $.trim(fields.rechargeOrderNoValue || ''),
                    recharge_url: $.trim(fields.rechargeAddress || ''),
                    recharge_time: $.trim(fields.rechargeTimeValue || ''),
                    recharge_amount: rechargeAmountNumber,
                    recharge_account: $.trim(fields.rechargeAccountValue || ''),
                    remark: $.trim(fields.rechargeRemarkText || '')
                },
                success: function (res) {
                    if (!(res && (res.code === 0 || res.success === true))) {
                        layer.msg((res && (res.msg || res.message)) || '提交失败');
                        return;
                    }
                    if (cashierRechargeLayerIndex !== null) {
                        layer.close(cashierRechargeLayerIndex);
                        cashierRechargeLayerIndex = null;
                    }
                    layer.msg((res && (res.msg || res.message)) || '提交成功');
                    reloadCashierTable(true);
                },
                error: function (xhr) {
                    var message = '提交失败，请稍后重试';
                    if (xhr && xhr.responseJSON && (xhr.responseJSON.msg || xhr.responseJSON.message)) {
                        message = xhr.responseJSON.msg || xhr.responseJSON.message;
                    }
                    layer.msg(message);
                }
            });
            return false;
        });

        $('#reload').on('click', function () {
            reloadCashierTable(true);
        });

        $('#reset').on('click', function () {
            $('#type').val('0');
            $('#rechargeStatus').val('');
            $('#orderNo').val('');
            $('#url').val('');
            $('#userInfo').val('');
            $('#starttime').val('');
            $('#endtime').val('');
            form.render();
            reloadCashierTable(true);
        });

        $('#type,#orderNo,#url,#userInfo,#starttime,#endtime').on('keydown', function (event) {
            if (event.keyCode === 13) {
                event.preventDefault();
                $('#reload').click();
            }
        });

    });
</script>
</body>
</html>

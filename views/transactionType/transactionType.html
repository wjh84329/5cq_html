<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>交易管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="../../layuiadmin/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../../layuiadmin/style/admin.css" media="all">
    <style>
        /* 审核弹层内表格：允许换行完整显示「类型」「标题」等，避免 layui 默认单行省略 */
        #audit-dialog-wrap .layui-table-view .layui-table-cell {
            height: auto !important;
            white-space: normal !important;
            word-wrap: break-word;
            word-break: break-word;
            line-height: 1.5 !important;
            padding-top: 8px;
            padding-bottom: 8px;
        }
    </style>

</head>
<body>

<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">交易管理</div>
                <div class="layui-card-body">
                    <div class="test-table-reload-btn" style="margin-bottom: 10px;">
                        <button type="button" id="transactiontype-button-add" shiro-event="jax:transactiontype:open-add" class="layui-btn"><i
                                class="layui-icon">&#xe654;</i>添加
                        </button>
                        <button type="button" id="transactiontype-button-audit" class="layui-btn layui-btn-normal" style="margin-left:8px;"><i
                                class="layui-icon">&#xe6b2;</i>招聘交易审核
                        </button>
                    </div>
                    <table id="auth-table" class="layui-hide" lay-filter="auth-table"></table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 招聘交易审核弹层内容（与「添加」弹层相同，由 layer 挂载/回收 DOM） -->
<div id="audit-dialog-wrap" hidden style="padding:4px 8px 12px;">
    <p style="color:#999;margin:0 0 12px;font-size:12px;line-height:1.5;">以下为用户发布的招聘/交易信息。上方类型树里的「修改/删除」只维护<strong>分类名称</strong>，与这里单条信息无关。</p>
    <div class="layui-form layui-form-pane" lay-filter="audit-filter" style="margin-bottom: 10px;">
        <div class="layui-inline">
            <label class="layui-form-label" style="width: 90px;">审核状态</label>
            <div class="layui-input-inline" style="width: 140px;">
                <select name="audit_verify" id="audit_verify" lay-filter="audit_verify">
                    <option value="">全部</option>
                    <option value="0" selected>待审核</option>
                    <option value="2">已通过</option>
                    <option value="1">已拒绝</option>
                </select>
            </div>
        </div>
        <div class="layui-inline">
            <label class="layui-form-label" style="width: 70px;">标题</label>
            <div class="layui-input-inline" style="width: 180px;">
                <input type="text" name="audit_val" id="audit_val" placeholder="关键词" autocomplete="off" class="layui-input">
            </div>
        </div>
        <div class="layui-inline">
            <button type="button" class="layui-btn layui-btn-sm" id="audit-search-btn">查询</button>
        </div>
    </div>
    <table id="audit-table" class="layui-hide" lay-filter="audit-table"></table>
</div>

<div id="auth-state" hidden>
    <button lay-event="update" shiro-event="jax:transactiontype:open-update" class="layui-btn layui-btn-primary layui-btn-xs"><i
            class="layui-icon">&#xe642;</i>修改
    </button>
    <button lay-event="remove" shiro-event="jax:transactiontype:open-remove" class="layui-btn layui-btn-primary layui-btn-xs"><i
            class="layui-icon">&#xe640;</i>删除
    </button>
</div>

<!--添加-->
<div id="submit-form-add" hidden>
    <button class="layui-btn" shiro-event="jax:transactiontype:add" lay-submit lay-filter="submit-form-transactiontype">立即提交</button>
    <!--添加-->
    <button type="reset" shiro-event="jax:transactiontype:add-reset" class="layui-btn layui-btn-primary">重置</button><!--添加-->
</div>
<!--修改-->
<div id="submit-form-update" hidden>
    <button class="layui-btn" shiro-event="jax:transactiontype:update" lay-submit lay-filter="submit-form-transactiontype">立即提交</button>
<!--    <button type="reset" shiro-event="jax:transactiontype:update-reset" class="layui-btn layui-btn-primary">重置</button>-->
</div>
<div id="layui-transactiontype" hidden>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-body" style="padding: 15px;">
                <form class="layui-form" id="layui-form-transactiontype" lay-filter="component-form-group">
                    <div class="layui-form-item">
                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">父类型</label>
                            <div class="layui-input-block" style="width:57%">
                                <select name="parent_id" id="parent_id" lay-verify="required" lay-filter="aihao">
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">类型名称</label>
                            <div class="layui-input-inline">
                                <input type="text" id="name" name="name" lay-verify="required" placeholder="请输入类型名称" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">排序</label>
                            <div class="layui-input-inline">
                                <input type="text"  name="sort" lay-verify="required|number" placeholder="请输入排序" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">是否热门</label>
                            <div class="layui-input-inline">
                                <input type="checkbox" name="popupar" lay-filter="switch"  lay-skin="switch" lay-text="是|否" >
                            </div>
                        </div>
                        <div class="layui-input-block">
                            <!--操作-->
                            <div class="layui-footer" id="submit-form-transactiontype-button" style="left: 0;">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>


<div id="layui-transactiontype-update" hidden>
    <div class="layui-fluid">
        <div class="layui-card">
            <div class="layui-card-body" style="padding: 15px;">
                <form class="layui-form" id="layui-form-transactiontype-update" lay-filter="component-form-group">
                    <div class="layui-form-item">
                        <input type="hidden" id="id" name="id">
                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">父类型</label>
                            <div class="layui-input-block" style="width:57%">
                                <select name="parent_id" id="parent_id_" lay-verify="required" lay-filter="aihao">
                                </select>
                            </div>
                        </div>
                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">类型名称</label>
                            <div class="layui-input-inline">
                                <input type="text" name="name" lay-verify="required" placeholder="请输入类型名称" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">排序</label>
                            <div class="layui-input-inline">
                                <input type="text"  name="sort" lay-verify="required|number" placeholder="请输入排序" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">是否热门</label>
                            <div class="layui-input-inline">
                                <input type="checkbox" id="popupar_" name="popupar" lay-skin="switch" lay-text="是|否">
                            </div>
                        </div>
                        <div class="layui-input-block">
                            <!--操作-->
                            <div class="layui-footer" id="update-transactiontype-button" style="left: 0;">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="../../layuiadmin/layui/layui.js"></script>
<script>
    layui.config({
        base: '../../../layuiadmin/' //静态资源所在路径
    }).extend({
        index: 'lib/index', //主入口模块
        treetable: '../treetable/treetable'
    }).use(['index','treetable', 'table', 'formgs', 'form', 'security', 'layer', 'upload', 'util'], function () {
        var $ = layui.jquery,
            admin = layui.admin,
            table = layui.table,
            formgs = layui.formgs,
            form = layui.form,//控制添加修改（同一个弹出层）关闭弹出层的索引
            upload = layui.upload,
            treetable = layui.treetable,
            util = layui.util,
            layer = layui.layer, closeindex;

        var typePtype=[];
        var auditTableInited = false;

        function auditVerifyText(v) {
            if (v === 0 || v === '0') return '待审核';
            if (v === 1 || v === '1') return '已拒绝';
            if (v === 2 || v === '2') return '已通过';
            return '-';
        }

        function openAuditDialog(row) {
            layer.open({
                type: 1,
                title: '招聘交易审核',
                area: ['380px', '320px'],
                shadeClose: true,
                content: '<div style="padding:12px 14px 0;">' +
                    '<select id="audit-select-verify" class="layui-input" style="height:36px;margin-bottom:10px;">' +
                    '<option value="pass">审核同意</option>' +
                    '<option value="reject">审核拒绝</option>' +
                    '</select>' +
                    '<textarea id="audit-reason" placeholder="请输入理由" class="layui-textarea" style="min-height:120px;"></textarea>' +
                    '</div>',
                btn: ['确定', '取消'],
                btnAlign: 'c',
                yes: function (index) {
                    var pass = $('#audit-select-verify').val() === 'pass';
                    var reason = ($('#audit-reason').val() || '').trim();
                    if (pass) {
                        reason = '同意';
                    }
                    if (!reason) {
                        layer.msg('审核理由不可以为空');
                        return;
                    }
                    var verifyVal = pass ? 2 : 1;
                    admin.req({
                        url: layui.setter.url + 'transactiontype/auditTransaction',
                        data: { id: row.id, verify: verifyVal, reason: reason },
                        done: function (res) {
                            if (res.msg === '操作成功' || res.code === 0) {
                                layer.close(index);
                                layer.msg(res.msg || '操作成功');
                                layui.table.reload('audit-table');
                            } else {
                                layer.msg(res.msg || '操作失败');
                            }
                        }
                    });
                }
            });
        }

        function initAuditTable() {
            table.render({
                elem: '#audit-table',
                id: 'audit-table',
                url: layui.setter.url + 'transactiontype/selectTransactionAudit',
                title: '招聘交易审核',
                cellMinWidth: 72,
                request: { pageName: 'page', limitName: 'num' },
                where: { sort: 't.create_date DESC', verify: 0 },
                parseData: function (res) {
                    if (!res || res.data == null) {
                        return { code: res ? res.code : -1, data: [], count: 0 };
                    }
                    var page = res.data;
                    return {
                        code: res.code,
                        data: page.data || [],
                        count: page.tnum != null ? page.tnum : 0
                    };
                },
                cols: [[
                    {
                        field: 'title', title: '标题', minWidth: 200, templet: function (d) {
                            var t = util.escape(String(d.title == null ? '' : d.title));
                            return '<div title="' + t.replace(/"/g, '&quot;') + '">' + t + '</div>';
                        }
                    },
                    {
                        field: 'typename', title: '类型', minWidth: 260, templet: function (d) {
                            var t = util.escape(String(d.typename == null ? '' : d.typename));
                            return '<div title="' + t.replace(/"/g, '&quot;') + '">' + t + '</div>';
                        }
                    },
                    {
                        field: 'money', title: '薪资', width: 80, templet: function (d) {
                            return d.money == 0 || d.money == null ? '面议' : util.escape(String(d.money));
                        }
                    },
                    { field: 'cname', title: '发布人', minWidth: 110 },
                    { field: 'create_date', title: '发布时间', minWidth: 168 },
                    {
                        field: 'verify', title: '状态', width: 88, templet: function (d) {
                            return auditVerifyText(d.verify);
                        }
                    },
                    {
                        title: '操作', width: 228, align: 'center', templet: function (d) {
                            var u = d.url || '#';
                            var html = '<a class="layui-btn layui-btn-primary layui-btn-xs" href="' + u + '" target="_blank" rel="noopener">详情</a> ';
                            if (d.verify === 0 || d.verify === '0') {
                                html += '<a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="audit_row">审核</a> ';
                            }
                            html += '<a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="del_row">删除</a>';
                            return html;
                        }
                    }
                ]],
                page: true,
                limits: [10, 20, 50],
                limit: 10,
                done: function () {
                    table.resize('audit-table');
                }
            });
        }

        table.on('tool(audit-table)', function (obj) {
            if (obj.event === 'audit_row') {
                openAuditDialog(obj.data);
            } else if (obj.event === 'del_row') {
                layer.confirm('确定删除该招聘交易？', function (index) {
                    admin.req({
                        url: layui.setter.url + 'transactiontype/removeTransaction',
                        data: { id: obj.data.id },
                        done: function (res) {
                            layer.close(index);
                            layer.msg(res.msg || '');
                            layui.table.reload('audit-table');
                        }
                    });
                });
            }
        });

        $('#audit-search-btn').on('click', function () {
            var v = $('#audit_verify').val();
            var q = { sort: 't.create_date DESC' };
            if (v !== '' && v !== undefined) {
                q.verify = parseInt(v, 10);
            }
            var val = ($('#audit_val').val() || '').trim();
            if (val) {
                q.val = val;
            }
            table.reload('audit-table', { where: q, page: { curr: 1 } });
        });

        form.on('select(audit_verify)', function () {
            $('#audit-search-btn').trigger('click');
        });

        $('#transactiontype-button-audit').on('click', function () {
            layer.open({
                type: 1,
                title: '招聘交易审核',
                area: ['96%', '90%'],
                maxmin: true,
                shadeClose: true,
                content: $('#audit-dialog-wrap'),
                success: function () {
                    if (!auditTableInited) {
                        initAuditTable();
                        auditTableInited = true;
                    } else {
                        table.reload('audit-table', { page: { curr: 1 } });
                    }
                    form.render('select');
                    setTimeout(function () {
                        table.resize('audit-table');
                    }, 150);
                }
            });
        });

        //渲染表格
        var renderTable = function () {
            admin.req({
                url: layui.setter.url + 'transactiontype/select' //实际使用请改成服务端真实接口
                , done: function (res) {
                    layer.load(2);
                    typePtype=res.data.typePtype;
                    treetable.render({
                        treeColIndex: 0,
                        treeSpid: 0,
                        treeIdName: 'id',
                        treePidName: 'parent_id',
                        elem: '#auth-table',
                        data:res.data.typeList,
                        treeDefaultClose: true,//是否默认折叠
                        cols: [[
                            {field: 'name', title: '类型名称'},
                            {field: 'popupar', align: 'center', title: '是否热门',templet: function (d) {
                                    var h = '';
                                    if(d.popupar==0){
                                        h = '非热门';
                                    }
                                    if(d.popupar==1){
                                        h = '热门';
                                    }
                                    return h;
                                }
                            },
                            {field: 'sort', title: '排序', align: 'center'},
                            {field: 'create_date', align: 'center', title: '创建时间'},
                            {field: 'update_date', align: 'center', title: '修改时间'},
                            {fixed: 'right', width: 215, toolbar: '#auth-state', title: '操作'}
                        ]],
                        page: false,
                        done: function (res, curr, count) {
                            layer.closeAll('loading');
                        }
                    });
                }
            });
        }
        renderTable();

        treetable.operation("#auth-table");


        table.on('tool(auth-table)', function (obj) {
            if (obj.event == 'update') {
                layer.open({
                    type: 1,//弹窗类型
                    area: [12, '45%'],//定义宽和高
                    title: ('【' + obj.data.name + '】'),//题目
                    shadeClose: false,//点击遮罩层关闭
                    content: $("#layui-transactiontype-update"),//打开的内容
                    success: function (index, layero) {
                        closeindex = layero;
                        var html="";
                        for(var i in typePtype){
                            html+="<option value='"+typePtype[i].id+"'>"+typePtype[i].name+"</option>"
                        }
                        $("#parent_id_").html(html);


                        if(obj.data.parent_id==0){
                            $("#parent_id_").attr("disabled","disabled");
                            $("#popupar_").attr("disabled","disabled");
                        }

                        formgs.get("layui-form-transactiontype-update", obj.data);

                        if(obj.data.popupar == "1") {
                            $("input[name='popupar']").prop("checked", true);
                        } else {
                            $("input[name='popupar']").prop("checked", false);
                        }
                        $("#update-transactiontype-button").html($("#submit-form-update").html());
                        //form.render刷新form 如果是针对单一刷新括号里面加上标签名 例：select刷新form.render('select')
                        form.render();

                    },
                    end: function () {
                        //getTableData();//结束之后请求表格数据的方法，新编辑的数据直接存库并展示在页面
                    }
                });
            } else if (obj.event == "remove") {
                layer.confirm('确定要删除【' + obj.data.name + '】这个类型吗？', function (index) {
                    admin.req({
                        url: layui.setter.url + "transactiontype/remove/" + obj.data.id
                    }).done(function (res) {
                        layer.close(index);
                        renderTable();
                        layer.msg(res.msg);
                    })
                });
            }
        })

        $("#transactiontype-button-add").on("click", function () {
            layer.open({
                type: 1,
                area: ['12', '45%'],
                title: ("新增类型"),
                shadeClose: false,
                content: $("#layui-transactiontype"),
                success: function (index, layero) {
                    closeindex = layero;
                    formgs.reset('layui-transactiontype');
                    var html="";
                    for(var i in typePtype){
                        html+="<option value='"+typePtype[i].id+"'>"+typePtype[i].name+"</option>"
                    }
                    $("#parent_id").html(html);
                    $("#submit-form-transactiontype-button").html($("#submit-form-add").html());
                    form.render();
                },
            });
        })

        //添加/修改提交
        form.on('submit(submit-form-transactiontype)', function (data) {
            var url = layui.setter.url + "transactiontype/" + ((data.field.id == null||data.field.id=='') ? "add" : "update");
            if(data.field.popupar == "on"||data.field.popupar==1) {
                data.field.popupar = "1";
            } else {
                data.field.popupar = "0";
            }
            admin.req({
                url: url,
                data: data.field,
                done: function (res) {
                    layer.close(closeindex);
                    renderTable();
                    layer.msg(res.msg);
                }
            })
            return false
        })

    });
</script>
</body>
</html>

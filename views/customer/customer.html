<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>游客管理</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="../../layuiadmin/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../../layuiadmin/style/admin.css" media="all">


</head>
<body>
<style>
    .layadmin-homepage-pad-ver {
        padding-top: 15px;
        padding-bottom: 15px;
    }

    .layadmin-homepage-pad-img {
        box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.1);
        border-radius: 50%;
    }
</style>
<div class="layui-fluid">
    <div class="layui-row layui-col-space15">
        <div class="layui-col-md12">
            <div class="layui-card">
                <div class="layui-card-header">会员管理</div>
                <div class="layui-card-body">
                    <div class="test-table-reload-btn" style="margin-bottom: 10px;">
                        <div class="layui-inline">
                            <input class="layui-input" name="polymerization" id="test-table-demoReload"
                                   autocomplete="off" placeholder="请输入用户名称进行搜索">
                        </div>
                        <button class="layui-btn" data-type="reload">搜索</button>
                    </div>
                    <table class="layui-hide" id="auth-table" lay-filter="auth-table"></table>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="auth-state" hidden>
    <button lay-event="remove" shiro-event="jax:customer:open-remove" class="layui-btn layui-btn-primary layui-btn-xs"><i
            class="layui-icon">&#xe640;</i>删除
    </button>
</div>


<script src="../../layuiadmin/layui/layui.js"></script>
<script>
    layui.config({
        base: '../../../layuiadmin/' //静态资源所在路径
    }).extend({
        index: 'lib/index', //主入口模块
    }).use(['index', 'table', 'formgs', 'form', 'security', 'layer'], function () {
        var $ = layui.jquery,
            admin = layui.admin,
            table = layui.table,
            formgs = layui.formgs,
            form = layui.form,//控制添加修改（同一个弹出层）关闭弹出层的索引
            layer = layui.layer, closeindex;
        table.render({
            elem: '#auth-table'
            , url: layui.setter.url + 'hcustomer/select'
            , title: '游客管理'
            , cols: [[
                {field: 'name', title: '会员名称',templet:function (obj) {
                        if(obj.name==''||obj.name==null){
                            obj.name='登录器用户'
                        }
                        return obj.name;
                    }}
                // , {field: 'email', title: '电子邮箱', sort: true}
                , {field: 'phone', title: '手机号', sort: true}
                , {field: 'qq', title: 'qq',  sort: true}
                , {field: 'is_vip', title: 'VIP',  sort: true,templet:function (obj) {
                            var r =
                                '<div class="layui-form" lay-filter="test1">' +
                                '<input type="checkbox" name="is_vip" data-id="'+obj.id+'" lay-skin="switch" value="'+obj.is_vip+'" lay-text="会员|非会员" lay-filter="is_vip" '+(obj.is_vip ==1?"checked":"")+' >'+
                                '</div>'
                            return r;

                    }}
                , {field: 'is_sh', title: '审核权限',  sort: true,templet:function (obj) {
                        var r =
                            '<div class="layui-form" lay-filter="test1">' +
                            '<input type="checkbox" name="is_sh" data-id="'+obj.id+'" lay-skin="switch" value="'+obj.is_sh+'" lay-text="开启|关闭" lay-filter="is_sh" '+(obj.nickname =='admin'?"checked":"")+' >'+
                            '</div>'
                        return r;

                }}
                , {field: 'logintime', title: '最近登录时间'}
                , {field: 'create_date', title: '创建时间'}
                ,{fixed: 'right', title: '操作', toolbar: '#auth-state'}
            ]]
            , page: true
        });

        //监听单元格编辑s-checkbox
        form.on('switch(is_vip)', function(data){
            var id=$(this).attr("data-id");
            var is_vip=data.elem.checked?1:0;
            update(id,is_vip);
        });
        form.on('switch(is_sh)', function(data){
            var id=$(this).attr("data-id");
            var is_sh=data.elem.checked?'admin':'';
            update1(id,is_sh);
        });

        //被调用的修改方法
        function update(id,is_vip){
            admin.req({
                url: layui.setter.url + "hcustomer/update",
                data:{id:id,is_vip:is_vip},
            });
        }

        function update1(id,is_sh){
            admin.req({
                url: layui.setter.url + "hcustomer/update",
                data:{id:id,nickname:is_sh},
            });
        }

       table.on('tool(auth-table)', function (obj) {
            if (obj.event == "remove") {
                layer.confirm('确定要删除【' + obj.data.name + '】这名游客吗？', function (index) {
                    admin.req({
                        url: layui.setter.url + "hcustomer/remove/" + obj.data.id
                    }).done(function (res) {
                        layer.close(index);
                        table.reload('auth-table');
                        layer.msg(res.msg);
                    })
                });
            }
        })
        //查询
        var $ = layui.$, active = {
            reload: function () {
                var demoReload = $('#test-table-demoReload');
                //执行重载
                table.reload('auth-table', {
                    page: {curr: 1}//重新从第 1 页开始
                    , where: {name: demoReload.val()}
                });
            },
        };

        $('.test-table-reload-btn .layui-btn').on('click', function () {
            var type = $(this).data('type');
            active[type] ? active[type].call(this) : '';
        });
    });
</script>
</body>
</html>

  <script>
        tailwind.config = {

  <style>
        /* 暗色模式下的滚动条样式 */

        }

        [data-theme='dark'] ::-webkit-scrollbar-track {

        }

        [data-theme='dark'] ::-webkit-scrollbar-thumb {

        .code-block {

        /* 确保代码块容器可交互 */

            position: relative;

        }

        /* 修复Tailwind not-prose的干扰 */

        /* 提升按钮可点击性 */

        /* 暗色模式适配 */

        }

    </style> 
 </head> 
 <body class="h-screen transition-colors duration-200 flex flex-col"> 
  <div id="app"> 
   <div class="container" style="margin-top: 20px"> 
    <main class="h-[calc(100vh-8rem)] container mx-auto px-4 py-2 overflow-hidden" style="height: initial;"> 
     <div class="gap-4 h-full"> 
      <div class="flex flex-col"> 
       <div class="bg-base-100 dark:bg-base-200 rounded-box shadow-lg dark:shadow-lg/20 p-4 mb-2 flex-none backdrop-blur-sm"> 
        <div class="mb-4 flex items-center"> 
         <input type="text" v-model="sseUrl" placeholder="请输入问题" class="input input-bordered w-full dark:bg-base-300 dark:border-base-content/10 dark:text-base-content/90 dark:placeholder-base-content/50"> 
        </div> 
        <div class="flex space-x-2"> 
         <button @click="connect" :disabled="isConnected" class="btn btn-primary"> 发送 </button> 
         <button @click="disconnect" :disabled="!isConnected" class="btn btn-error"> 终止 </button> 
         <button @click="clearMessages" class="btn btn-ghost"> 清空 </button> 
        </div> 
       </div> 
      </div> 
      <div class="flex flex-col gap-2 min-h-0"> 
       <div class="flex-1 flex flex-col min-h-0"> 
        <h2 class="text-xl font-bold mb-1">推理过程</h2> 
        <div ref="reasoningRef" class="flex-1 overflow-y-auto min-h-0"> 
         <div class="mockup-window bg-base-300 h-full flex flex-col"> 
          <div class="flex-1 px-6 py-4 bg-base-200 overflow-y-auto">
            {{ reasoningChain }} 
          </div> 
         </div> 
        </div> 
       </div> 
       <div class="flex-1 flex flex-col min-h-0"> 
        <h2 class="text-xl font-bold mb-1">最终答案</h2> 
        <div ref="answerRef" class="flex-1 overflow-y-auto min-h-0"> 
         <div class="mockup-window bg-base-300 h-full flex flex-col"> 
          <div class="flex-1 px-6 py-4 bg-base-200 overflow-y-auto prose dark:prose-invert max-w-none" v-html="finalAnswer"> 
          </div> 
         </div> 
        </div> 
       </div> 
      </div> 
     </div> 
    </main> 
   </div> 
  </div> 
  <script>
    const { createApp, ref, computed, watch, nextTick, onMounted } = Vue

    createApp({
        setup() {
            const isClipboardSupported = ref(!!navigator.clipboard);

            // 完整的marked配置（在setup()中添加）
            const renderer = new marked.Renderer();
            const originalCodeRenderer = renderer.code.bind(renderer);
            renderer.code = (code, language) => {
                const id = `code-${Math.random().toString(36).slice(2, 11)}`;
                return `
    <div class="code-block relative group not-prose">
      <button style="width: 100px;color: #ffffff;" class="copy-btn btn btn-xs btn-ghost absolute right-2 top-2 opacity-0 group-hover:opacity-100 transition-opacity duration-200"
              data-clipboard-target="#${id}"
              title="复制代码">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.666 3.888A2.25 2.25 0 0013.5 3h-3a2.25 2.25 0 00-2.166 2.888c-.063.095-.173.208-.335.36l-3.124 3.124a2.25 2.25 0 00-.514 2.103c.223.628.417 1.024.583 1.303.193.327.414.652.667.96.194.237.468.49.823.74.16.113.328.22.504.322"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.666 13.888c.063.094.173.208.335.36l3.124 3.124a2.25 2.25 0 00.514 2.103c-.223.628-.417 1.024-.583 1.303-.193.327-.414.652-.667.96-.194.237-.468.49-.823.74-.16.113-.328.22-.504.322m0 0a31.357 31.357 0 01-1.02.158 21.27 21.27 0 01-.476.028l-.472-.004c-.973-.015-1.788-.1-2.571-.246-.767-.143-1.514-.354-2.226-.626a.75.75 0 01-.374-1.014c.22-.442.22-.767 0-1.056-.22-.29-.22-.705 0-1.146.22-.442.22-.767 0-1.056a.75.75 0 01.374-1.014c.712-.272 1.46-.483 2.226-.626.783-.146 1.598-.23 2.572-.246l.47-.004c.16.001.32.006.477.028.341.035.682.085 1.022.158M13.5 13.5h3a2.25 2.25 0 002.166-2.888c-.064-.095-.174-.208-.336-.36l-3.124-3.124a2.25 2.25 0 00-.514-2.103c.223-.628.417-1.024.583-1.303.193-.327.414-.652.667-.96.194-.237.468-.49.823-.74.16-.113.328-.22.504-.322"/>
                </svg>
                <span>点击复制</span>
      </button>
      <pre id="${id}" class="!mt-6 language-${language}">${originalCodeRenderer(code, language)}</pre>
    </div>
  `;
            };

            // 在finalAnswer计算属性前配置marked
            marked.setOptions({
                renderer,
                highlight: function(code, lang) {
                    return hljs.highlightAuto(code).value;
                },
                langPrefix: 'hljs language-'
            });

            // 在setup()中添加
            // 优化后的复制功能实现
            const addCopyFunctionality = () => {
                // 使用事件委托处理动态内容
                document.querySelectorAll('.prose').forEach(container => {
                    // 移除旧的监听器
                    container.removeEventListener('click', handleCopyClick);
                    // 添加新监听器
                    container.addEventListener('click', handleCopyClick);
                });
            };

// 单独提取的事件处理函数
            const handleCopyClick = async (event) => {
                const button = event.target.closest('.copy-btn');
                if (!button) return;

                try {
                    const targetId = button.dataset.clipboardTarget;
                    const preElement = document.querySelector(targetId);

                    if (!preElement) {
                        throw new Error('目标代码块不存在');
                    }

                    const textToCopy = preElement.textContent;

                    // 兼容现代和传统方法
                    if (isClipboardSupported.value) {
                        await navigator.clipboard.writeText(textToCopy);
                    } else {
                        // 传统复制方法
                        const textArea = document.createElement('textarea');
                        textArea.value = textToCopy;
                        textArea.style.position = 'fixed';
                        document.body.appendChild(textArea);
                        textArea.select();

                        const success = document.execCommand('copy');
                        document.body.removeChild(textArea);

                        if (!success) {
                            throw new Error('无法访问剪贴板');
                        }
                    }

                    // 统一视觉反馈
                    const icon = button.querySelector('svg');
                    const span = button.querySelector('span');
                    if (span) {
                        span.textContent = '复制成功';
                        setTimeout(() => {
                            span.textContent = '点击复制';
                        }, 2000);
                    }
                    if (icon) {
                        const originalColor = icon.getAttribute('stroke');
                        icon.style.stroke = '#10B981'; // 成功颜色
                        setTimeout(() => {
                            icon.style.stroke = originalColor;
                        }, 2000);
                    }

                } catch (err) {
                    console.error('复制失败:', err);
                    layer.msg(`复制失败: ${err.message}`, {
                        icon: 2,
                        time: 2000,
                        offset: 'b'
                    });
                }
            };


            const sseUrl = ref('')
            // const baseUrl = ref('http://localhost:8086/server/')
            const messages = ref([])
            const isConnected = ref(false)
            const currentTheme = ref('light')
            const isInThinkTag = ref(false)
            let eventSource = null
            const reasoningRef = ref(null)
            const answerRef = ref(null)

            // 计算推理过程（思考链）
            const reasoningChain = computed(() => {
                return messages.value
                    .filter(m => m.parsed?.reasoning_content)
                    .map(m => m.parsed.reasoning_content)
                    .join('')
            })


            // 计算最终答案
            const finalAnswer = computed(() => {
                const rawContent = messages.value
                    .filter(m => m.parsed?.content)
                    .map(m => m.parsed.content)
                    .join('')
                return marked.parse(rawContent)
            })
            watch(finalAnswer, () => {
                nextTick(() => {
                    // addCopyButtonsToPre();
                    addCopyFunctionality();
                });
            });

            // 初始化主题
            onMounted(() => {
                const savedTheme = localStorage.getItem('theme')
                currentTheme.value = savedTheme || 'light'
                document.documentElement.setAttribute('data-theme', currentTheme.value)
            })

            // 切换主题
            const toggleTheme = () => {
                currentTheme.value = currentTheme.value === 'light' ? 'dark' : 'light'
                localStorage.setItem('theme', currentTheme.value)
                document.documentElement.setAttribute('data-theme', currentTheme.value)
            }

            // 滚动到底部的函数
            const scrollToBottom = (element) => {
                if (element) {
                    // 获取实际的滚动容器（mockup-window 内的 overflow-y-auto 元素）
                    const scrollContainer = element.querySelector('.overflow-y-auto')
                    if (scrollContainer) {
                        scrollContainer.scrollTop = scrollContainer.scrollHeight
                    }
                }
            }

            // 监听消息变化，自动滚动
            watch(() => [messages.value.length, reasoningChain.value, finalAnswer.value], () => {
                nextTick(() => {
                    if (reasoningRef.value) {
                        scrollToBottom(reasoningRef.value)
                    }
                    if (answerRef.value) {
                        scrollToBottom(answerRef.value)
                    }
                    // 滚动原始数据区域
                    const messagesContainer = document.querySelector('.messages-container .overflow-y-auto')
                    if (messagesContainer) {
                        messagesContainer.scrollTop = messagesContainer.scrollHeight
                    }
                })
            }, { deep: true })

            const parseSSEData = (data) => {
                try {
                    const parsed = JSON.parse(data)

                    // 检查是否直接返回了 reasoning_content
                    const directReasoning = parsed.choices?.[0]?.message?.reasoningContent
                    if (directReasoning) {
                        return {
                            id: parsed.id,
                            created: parsed.created,
                            model: parsed.model,
                            reasoning_content: directReasoning,
                            content: parsed.choices?.[0]?.message?.content || ''
                        }
                    }

                    const content = parsed.choices?.[0]?.message?.content || ''

                    // 处理 think 标签包裹的情况
                    if (content.includes('<think>')) {
                        isInThinkTag.value = true
                        const startIndex = content.indexOf('<think>') + '<think>'.length
                        return {
                            id: parsed.id,
                            created: parsed.created,
                            model: parsed.model,
                            reasoning_content: content.substring(startIndex),
                            content: content.substring(0, content.indexOf('<think>'))
                        }
                    }

                    if (content.includes('</think>')) {
                        isInThinkTag.value = false
                        const endIndex = content.indexOf('</think>')
                        return {
                            id: parsed.id,
                            created: parsed.created,
                            model: parsed.model,
                            reasoning_content: content.substring(0, endIndex),
                            content: content.substring(endIndex + '</think>'.length)
                        }
                    }

                    // 根据状态决定内容归属
                    return {
                        id: parsed.id,
                        created: parsed.created,
                        model: parsed.model,
                        reasoning_content: isInThinkTag.value ? content : '',
                        content: isInThinkTag.value ? '' : content
                    }
                } catch (e) {
                    console.error('解析JSON失败:', e)
                    return null
                }
            }

            const connect = () => {
                if (eventSource) {
                    eventSource.close()
                }

                // 清空消息
                clearMessages()
                var baseUrl = 'http://127.0.0.1:8086/server/'
                try {
                    eventSource = new EventSource(baseUrl + 'ai/chat3?prompt=' + sseUrl.value)
                    isConnected.value = true

                    eventSource.onmessage = (event) => {
                        // console.log('Received data:', event.data)
                        const parsed = parseSSEData(event.data)
                        messages.value.push({
                            time: new Date().toLocaleTimeString(),
                            data: event.data,
                            parsed: parsed
                        })
                    }

                    eventSource.onerror = (error) => {
                        console.error('SSE Error:', error)
                        disconnect()
                    }
                } catch (error) {
                    console.error('Connection Error:', error)
                    disconnect()
                }
            }

            const disconnect = () => {
                if (eventSource) {
                    eventSource.close()
                    eventSource = null
                }
                isConnected.value = false
            }

            const clearMessages = () => {
                messages.value = []
            }

            return {
                sseUrl,
                messages,
                isConnected,
                currentTheme,
                toggleTheme,
                connect,
                disconnect,
                clearMessages,
                reasoningChain,
                finalAnswer,
                reasoningRef,
                answerRef
            }
        }
    }).mount('#app')
</script>  
 </body>
